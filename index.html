<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Árlista</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    :root {
      --bg: #0d0f14;
      --surface: #161922;
      --surface2: #1e2330;
      --border: #2a3045;
      --accent: #e8c44a;
      --accent2: #4ae8b0;
      --text: #e8ecf4;
      --text-muted: #7a8099;
      --danger: #e84a6a;
      --radius: 10px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Syne', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      border-bottom: 1px solid var(--border);
      padding: 20px 40px;
      display: flex;
      align-items: center;
      gap: 16px;
      background: var(--surface);
    }

    header .logo {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: var(--accent);
    }

    header .subtitle {
      font-size: 13px;
      color: var(--text-muted);
      font-weight: 400;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 32px 24px;
    }

    /* Customer selector */
    .selector-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px 32px;
      margin-bottom: 32px;
    }

    .selector-card label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    .select-wrap {
      position: relative;
    }

    .select-wrap::after {
      content: '▾';
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--accent);
      pointer-events: none;
    }

    select {
      width: 100%;
      max-width: 480px;
      padding: 13px 44px 13px 16px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      appearance: none;
      transition: border-color 0.2s;
    }

    select:focus { outline: none; border-color: var(--accent); }

    .customer-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 14px;
      padding: 6px 14px;
      background: color-mix(in srgb, var(--accent) 12%, transparent);
      border: 1px solid color-mix(in srgb, var(--accent) 30%, transparent);
      border-radius: 40px;
      font-size: 12px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 1px;
    }

    /* Loading */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 60px;
      color: var(--text-muted);
      font-size: 14px;
    }

    .spinner {
      width: 20px; height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Error */
    .error-box {
      background: color-mix(in srgb, var(--danger) 10%, transparent);
      border: 1px solid color-mix(in srgb, var(--danger) 30%, transparent);
      border-radius: var(--radius);
      padding: 16px 20px;
      color: var(--danger);
      font-size: 14px;
      margin-bottom: 20px;
    }

    /* Price table */
    .table-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .table-title {
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -0.3px;
    }

    .item-count {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 400;
    }

    .search-wrap {
      position: relative;
    }

    .search-wrap input {
      padding: 9px 14px 9px 36px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      width: 240px;
      transition: border-color 0.2s;
    }

    .search-wrap input:focus { outline: none; border-color: var(--accent); }

    .search-wrap::before {
      content: '⌕';
      position: absolute;
      left: 11px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 16px;
    }

    .price-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    .price-table thead tr {
      border-bottom: 2px solid var(--border);
    }

    .price-table th {
      padding: 10px 14px;
      text-align: left;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-muted);
      white-space: nowrap;
    }

    .price-table th:last-child,
    .price-table td:last-child {
      text-align: right;
    }

    .price-table tbody tr.main-row {
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
      cursor: pointer;
    }

    .price-table tbody tr.main-row:hover {
      background: var(--surface2);
    }

    .price-table tbody tr.main-row.expanded {
      background: color-mix(in srgb, var(--accent) 5%, transparent);
      border-bottom-color: transparent;
    }

    .price-table td {
      padding: 12px 14px;
      vertical-align: middle;
    }

    .item-code {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--text-muted);
    }

    .item-name {
      font-weight: 600;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .expand-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 18px;
      height: 18px;
      border-radius: 4px;
      background: var(--surface2);
      border: 1px solid var(--border);
      font-size: 10px;
      color: var(--text-muted);
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .expanded .expand-icon {
      background: color-mix(in srgb, var(--accent) 15%, transparent);
      border-color: var(--accent);
      color: var(--accent);
      transform: rotate(180deg);
    }

    .no-upsell .expand-icon {
      opacity: 0;
      pointer-events: none;
    }

    .size-badge {
      display: inline-block;
      padding: 2px 8px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--text-muted);
    }

    .price-val {
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      font-weight: 500;
      color: var(--accent);
    }

    /* Upsell rows */
    .upsell-container {
      display: none;
    }

    .upsell-container.open {
      display: table-row-group;
    }

    .upsell-row {
      background: color-mix(in srgb, var(--accent2) 4%, transparent);
      border-bottom: 1px solid color-mix(in srgb, var(--accent2) 15%, transparent);
    }

    .upsell-row td {
      padding: 9px 14px;
    }

    .upsell-header-row td {
      padding: 6px 14px 4px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--accent2);
      background: color-mix(in srgb, var(--accent2) 6%, transparent);
    }

    .upsell-label {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      color: var(--accent2);
      text-transform: uppercase;
    }

    .upsell-label::before {
      content: '↳';
      font-size: 12px;
    }

    .upsell-price {
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      color: var(--accent2);
    }

    .upsell-end-row td {
      padding: 4px;
      background: transparent;
      border-bottom: 2px solid var(--border);
    }

    /* Empty state */
    .empty {
      text-align: center;
      padding: 48px;
      color: var(--text-muted);
      font-size: 14px;
    }

    @media (max-width: 700px) {
      header { padding: 16px 20px; }
      .container { padding: 20px 16px; }
      .selector-card { padding: 20px 16px; }
      select { max-width: 100%; }
      .table-header { flex-direction: column; align-items: flex-start; gap: 12px; }
      .search-wrap input { width: 100%; }
      .price-table { font-size: 12px; }
      .price-table th, .price-table td { padding: 9px 8px; }
    }
  </style>
</head>
<body>

<header>
  <div>
    <div class="logo">ÁRLISTA</div>
    <div class="subtitle">Vevőspecifikus árjegyzék</div>
  </div>
</header>

<div class="container">
  <div class="selector-card">
    <label>Vevő kiválasztása</label>
    <div id="loadingCustomers" class="loading"><div class="spinner"></div> Vevők betöltése…</div>
    <div id="selectorArea" style="display:none">
      <div class="select-wrap">
        <select id="customerSelect">
          <option value="">— Válasszon vevőt —</option>
        </select>
      </div>
      <div id="customerBadge" style="display:none"></div>
    </div>
    <div id="customerError" class="error-box" style="display:none"></div>
  </div>

  <div id="priceArea" style="display:none">
    <div class="table-header">
      <div>
        <div class="table-title">Termékek és árak</div>
        <div class="item-count" id="itemCount"></div>
      </div>
      <div class="search-wrap">
        <input type="text" id="searchInput" placeholder="Keresés…" />
      </div>
    </div>
    <div id="loadingPrices" class="loading" style="display:none"><div class="spinner"></div> Árak betöltése…</div>
    <div id="priceError" class="error-box" style="display:none"></div>
    <div id="tableWrap"></div>
  </div>
</div>

<script>
// ─── API endpoints ──────────────────────────────────────────────────────────
const URL_CUSTOMERS = 'https://app.clouderp.hu/api/1/automatism/file-share/?s=Z0FBQUFBQnByXzBKRkhJMUtwRkR3UXFUdTFPS1ZXd1Utd1Vrd09DYVl6Q1dKMVBmdkt1LW1tT1FWWEZ1VW9FYUNDdklqbTdOc1VvX0tGd29Lc05aRTNzMWg0XzdoSUNSUHJPRzBLRWxTS2hGajhlZzRYZ25IUFk9';
const URL_PRICES    = 'https://app.clouderp.hu/api/1/automatism/file-share/?s=Z0FBQUFBQnByXzBtQTVXd0UxOV9QSHBoMm9EUkJpakVZZXpacFp0MVBNVnBicTZFZFQ2RXFGMDY3VkFPRnFna1BnMTdIMkNJd3lyTW5VVzlEZDZ6ZjFrY0NZdkNXa0pGcEZhRWY5b19Rc2pQcUFVTVF0STJ2MzQ9';
const URL_SIZES     = 'https://app.clouderp.hu/api/1/automatism/file-share/?s=Z0FBQUFBQnByXzFVTkF6NUVJdG9kd2dSb2Q2OXJYX2VqQmYxLVVaOGs0RW9IVVlpemE0VXE3d2J6Rld6TFBaX1ZvQzlQdllEa3BCb1BkLTl5VjBVN0I0SDhtRGhvU3djNXZRalF5dVlVdXdIWndrZkhkT0l1VkU9';

// ─── State ───────────────────────────────────────────────────────────────────
let customersData = [];
let pricesData    = [];
let sizesData     = [];
let selectedCustomer = null;
let expandedItems = new Set();
let allRows = [];

// ─── Fetch helpers (XLSX via SheetJS) ────────────────────────────────────────
async function fetchCSV(url) {
  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const buffer = await res.arrayBuffer();
  const bytes = new Uint8Array(buffer);

  // Detect if ZIP/XLSX (PK header) or CSV
  const isXLSX = bytes[0] === 0x50 && bytes[1] === 0x4B;
  console.log('File type:', isXLSX ? 'XLSX' : 'CSV/text', '| First bytes:', bytes[0], bytes[1], bytes[2], bytes[3]);

  if (isXLSX) {
    const wb = XLSX.read(buffer, { type: 'array' });
    const sheet = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(sheet, { defval: '' });
    console.log('XLSX rows:', rows.length, '| Sample:', rows[0]);
    return rows.map(r => {
      const out = {};
      for (const k of Object.keys(r)) out[String(k).trim()] = String(r[k]).trim();
      return out;
    });
  }

  // Fallback: CSV with encoding detection
  const encodings = ['utf-8','windows-1250','iso-8859-2'];
  for (const enc of encodings) {
    try {
      const text = new TextDecoder(enc, {fatal:true}).decode(buffer);
      const sample = text.slice(0,300);
      const ok = (sample.match(/[a-zÀ-ž0-9 ;,.]/gi)||[]).length;
      if (ok/sample.length > 0.6) return parseCSV(text);
    } catch(e) {}
  }
  return parseCSV(new TextDecoder('windows-1250').decode(buffer));
}

function parseCSV(text) {
  const lines = text.trim().split('\n');
  if (lines.length < 2) return [];
  const sep = lines[0].includes(';') ? ';' : ',';
  const headers = lines[0].split(sep).map(h => h.trim().replace(/^"|"$/g, ''));
  return lines.slice(1).map(line => {
    const vals = splitCSVLine(line, sep);
    const obj = {};
    headers.forEach((h, i) => { obj[h] = (vals[i] || '').trim().replace(/^"|"$/g, ''); });
    return obj;
  });
}

function splitCSVLine(line, sep) {
  const result = [];
  let cur = '', inQ = false;
  for (const c of line) {
    if (c === '"') inQ = !inQ;
    else if (c === sep && !inQ) { result.push(cur); cur = ''; }
    else cur += c;
  }
  result.push(cur);
  return result;
}

// ─── Init ────────────────────────────────────────────────────────────────────
async function init() {
  try {
    const [customers, prices, sizes] = await Promise.all([
      fetchCSV(URL_CUSTOMERS),
      fetchCSV(URL_PRICES),
      fetchCSV(URL_SIZES)
    ]);
    customersData = customers;
    pricesData    = prices;
    sizesData     = sizes;

    console.log('Customers sample:', customers[0]);
    console.log('Prices sample:', prices[0]);
    console.log('Sizes sample:', sizes[0]);

    buildCustomerSelect(customers);
    document.getElementById('loadingCustomers').style.display = 'none';
    document.getElementById('selectorArea').style.display = 'block';
  } catch(e) {
    document.getElementById('loadingCustomers').style.display = 'none';
    const err = document.getElementById('customerError');
    err.style.display = 'block';
    err.textContent = 'Hiba az adatok betöltésekor: ' + e.message;
    console.error(e);
  }
}

// ─── Build customer select ───────────────────────────────────────────────────
function buildCustomerSelect(customers) {
  const sample = customers[0] || {};
  const keys = Object.keys(sample);
  console.log('Customer ALL columns:', keys);
  console.log('Customer sample row:', sample);

  // Score each key: prefer keys whose values look like names (long, has spaces/letters)
  function scoreName(k) {
    const vals = customers.slice(0,5).map(r => String(r[k]||''));
    const avgLen = vals.reduce((s,v)=>s+v.length,0)/vals.length;
    const hasSpace = vals.some(v => v.includes(' '));
    const isNumeric = vals.every(v => /^\d+$/.test(v));
    if (isNumeric) return -1;
    return avgLen + (hasSpace ? 20 : 0);
  }

  // Name: explicit pattern first, then highest score
  let nameKey = keys.find(k => k === 'Név') || keys.find(k => /nev$|_nev|nev_|^nev$|name$|megnevezes/i.test(k));
  if (!nameKey) nameKey = keys.slice().sort((a,b) => scoreName(b)-scoreName(a))[0];

  // ID: explicit pattern, or lowest-score key
  let idKey = keys.find(k => /^id$|_id$|kod$|^kod|cikkszam|ugyfel.*szam|szam$/i.test(k));
  if (!idKey) idKey = keys.find(k => k !== nameKey && /^\d+$/.test(String(sample[k]||'')));
  if (!idKey) idKey = keys.find(k => k !== nameKey) || keys[0];

  // Group: explicit pattern
  let groupKey = keys.find(k => /csoport|group|kategor|pricegroup|ar.*csoport|arkategoria/i.test(k));
  if (!groupKey) groupKey = keys.find(k => k !== nameKey && k !== idKey) || keys[0];

  console.log('Detected customer cols:', { nameKey, idKey, groupKey });
  console.log('Name sample values:', customers.slice(0,3).map(r=>r[nameKey]));
  console.log('Group sample values:', customers.slice(0,3).map(r=>r[groupKey]));

  window._customerCols = { nameKey, idKey, groupKey };

  const sel = document.getElementById('customerSelect');
  const sorted = [...customers].sort((a,b) => (a[nameKey]||'').localeCompare(b[nameKey]||'', 'hu'));
  sorted.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c[idKey] || c[nameKey];
    opt.textContent = c[nameKey] || c[idKey];
    opt.dataset.group = c[groupKey] || '';
    opt.dataset.name  = c[nameKey] || '';
    sel.appendChild(opt);
  });

  sel.addEventListener('change', onCustomerChange);
}

// ─── Customer selected ───────────────────────────────────────────────────────
function onCustomerChange() {
  const sel = document.getElementById('customerSelect');
  const opt = sel.options[sel.selectedIndex];
  if (!opt || !opt.value) {
    document.getElementById('customerBadge').style.display = 'none';
    document.getElementById('priceArea').style.display = 'none';
    return;
  }

  const group = opt.dataset.group;
  const name  = opt.dataset.name;

  selectedCustomer = { value: opt.value, name, group };

  const badge = document.getElementById('customerBadge');
  badge.style.display = 'inline-flex';
  badge.innerHTML = `<span>Árcsoport:</span> <strong>${group || '—'}</strong>`;
  badge.className = 'customer-badge';

  expandedItems.clear();
  renderPriceTable(group);
}

// ─── Render price table ───────────────────────────────────────────────────────
function renderPriceTable(group) {
  document.getElementById('priceArea').style.display = 'block';
  document.getElementById('priceError').style.display = 'none';
  document.getElementById('tableWrap').innerHTML = '';

  // Detect price columns
  const pSample = pricesData[0] || {};
  const pKeys   = Object.keys(pSample);
  console.log('Price columns:', pKeys);

  // Item code / name
  const codeKey  = pKeys.find(k => /cikkszam|cikk_szam|kod|code|item_?code|sku|szam/i.test(k)) || pKeys[0];
  const nameKey  = pKeys.find(k => /nev|name|megnevezes|leiras/i.test(k)) || pKeys[1] || pKeys[0];

  // Price column matching group
  let priceKey = pKeys.find(k => k === group);
  if (!priceKey) priceKey = pKeys.find(k => k.toLowerCase() === (group||'').toLowerCase());
  if (!priceKey) priceKey = pKeys.find(k => new RegExp(group, 'i').test(k));
  if (!priceKey) {
    // fallback: pick first numeric-looking column that isn't code/name
    priceKey = pKeys.find(k => k !== codeKey && k !== nameKey && /ar|price|^[A-Z]\d*$|csoport/i.test(k));
  }
  if (!priceKey) priceKey = pKeys[pKeys.length - 1];

  console.log('Using price key:', priceKey, 'for group:', group);

  // Detect size columns
  const sSample = sizesData[0] || {};
  const sKeys   = Object.keys(sSample);
  console.log('Size columns:', sKeys);

  const sCodeKey  = sKeys.find(k => /cikkszam|cikk_szam|kod|code|item_?code|sku|szam/i.test(k)) || sKeys[0];
  const sMeasKey  = sKeys.find(k => /meret|size|dimenz|mm|cm|hossz|szeles|magass/i.test(k)) || sKeys[1] || sKeys[0];
  const sUpsellKey = sKeys.find(k => /upsell|kapcsol|ajanlott|cross/i.test(k));

  console.log('Size code key:', sCodeKey, 'measure key:', sMeasKey, 'upsell key:', sUpsellKey);

  // Build size map and upsell map
  const sizeMap   = {};
  const upsellMap = {};
  sizesData.forEach(s => {
    const code = s[sCodeKey];
    if (!code) return;
    sizeMap[code] = s[sMeasKey] || '';
    if (sUpsellKey) upsellMap[code] = s[sUpsellKey] || '';
  });

  // Build price map
  const priceMap = {};
  pricesData.forEach(p => {
    const code = p[codeKey];
    if (!code) return;
    priceMap[code] = { name: p[nameKey], price: p[priceKey], raw: p };
  });

  // Main list from prices
  allRows = pricesData
    .filter(p => p[codeKey])
    .map(p => {
      const code = p[codeKey];
      return {
        code,
        name: p[nameKey] || '',
        price: p[priceKey] || '',
        size: sizeMap[code] || '',
        upsellCodes: (upsellMap[code] || '').split(/[,;|]/).map(s=>s.trim()).filter(Boolean)
      };
    });

  document.getElementById('itemCount').textContent = allRows.length + ' termék';
  document.getElementById('searchInput').value = '';
  document.getElementById('searchInput').oninput = () => renderRows(group, priceMap, sizeMap, codeKey, nameKey, priceKey);

  window._tableState = { group, priceMap, sizeMap, codeKey, nameKey, priceKey };
  renderRows(group, priceMap, sizeMap, codeKey, nameKey, priceKey);
}

function renderRows(group, priceMap, sizeMap, codeKey, nameKey, priceKey) {
  const query = (document.getElementById('searchInput').value || '').toLowerCase();
  const filtered = allRows.filter(r =>
    !query ||
    r.code.toLowerCase().includes(query) ||
    r.name.toLowerCase().includes(query)
  );

  document.getElementById('itemCount').textContent = filtered.length + ' termék';

  if (!filtered.length) {
    document.getElementById('tableWrap').innerHTML = '<div class="empty">Nincs találat</div>';
    return;
  }

  const table = document.createElement('table');
  table.className = 'price-table';
  table.innerHTML = `
    <thead>
      <tr>
        <th>Cikkszám</th>
        <th>Megnevezés</th>
        <th>Méret</th>
        <th>Ár</th>
      </tr>
    </thead>
  `;

  const tbody = document.createElement('tbody');

  filtered.forEach((row, idx) => {
    const hasUpsell = row.upsellCodes.length > 0;
    const isExpanded = expandedItems.has(row.code);

    // Main row
    const tr = document.createElement('tr');
    tr.className = 'main-row' + (isExpanded ? ' expanded' : '') + (!hasUpsell ? ' no-upsell' : '');
    tr.dataset.code = row.code;
    tr.innerHTML = `
      <td><span class="item-code">${esc(row.code)}</span></td>
      <td>
        <div class="item-name">
          <span class="expand-icon">▾</span>
          ${esc(row.name)}
        </div>
      </td>
      <td>${row.size ? `<span class="size-badge">${esc(row.size)}</span>` : '—'}</td>
      <td><span class="price-val">${formatPrice(row.price)}</span></td>
    `;
    if (hasUpsell) {
      tr.addEventListener('click', () => toggleUpsell(row.code));
    }
    tbody.appendChild(tr);

    // Upsell section
    if (hasUpsell) {
      const upsellGroup = document.createElement('tbody');
      upsellGroup.className = 'upsell-container' + (isExpanded ? ' open' : '');
      upsellGroup.id = 'upsell-' + row.code.replace(/[^a-zA-Z0-9]/g, '_');

      // Header row
      const htr = document.createElement('tr');
      htr.className = 'upsell-header-row';
      htr.innerHTML = `<td colspan="4">↳ Kapcsolódó termékek (Upsell)</td>`;
      upsellGroup.appendChild(htr);

      row.upsellCodes.forEach(uCode => {
        const uInfo = priceMap[uCode];
        const uSize = sizeMap[uCode] || '';
        const uName = uInfo ? uInfo.name : uCode;
        const uPrice = uInfo ? uInfo.price : '—';

        const utr = document.createElement('tr');
        utr.className = 'upsell-row';
        utr.innerHTML = `
          <td><span class="item-code">${esc(uCode)}</span></td>
          <td><span class="upsell-label">${esc(uName)}</span></td>
          <td>${uSize ? `<span class="size-badge">${esc(uSize)}</span>` : '—'}</td>
          <td><span class="upsell-price">${formatPrice(uPrice)}</span></td>
        `;
        upsellGroup.appendChild(utr);
      });

      const etr = document.createElement('tr');
      etr.className = 'upsell-end-row';
      etr.innerHTML = '<td colspan="4"></td>';
      upsellGroup.appendChild(etr);

      tbody.appendChild(upsellGroup);
    }
  });

  table.appendChild(tbody);
  document.getElementById('tableWrap').innerHTML = '';
  document.getElementById('tableWrap').appendChild(table);
}

function toggleUpsell(code) {
  if (expandedItems.has(code)) {
    expandedItems.delete(code);
  } else {
    expandedItems.add(code);
  }
  const st = window._tableState;
  renderRows(st.group, st.priceMap, st.sizeMap, st.codeKey, st.nameKey, st.priceKey);
}

function formatPrice(val) {
  if (!val || val === '—') return '—';
  const num = parseFloat(String(val).replace(/\s/g,'').replace(',','.'));
  if (isNaN(num)) return esc(val);
  return num.toLocaleString('hu-HU', { minimumFractionDigits: 0, maximumFractionDigits: 0 }) + ' Ft';
}

function esc(str) {
  return String(str || '')
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

// ─── Start ───────────────────────────────────────────────────────────────────
init();
</script>
</body>
</html>
