<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Árlista</title>

<!-- SheetJS for Excel parsing -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
  /* ── CSS Variables & Reset ─────────────────────────────── */
  :root {
    --bg:        #0f1117;
    --surface:   #181c27;
    --surface2:  #1e2333;
    --border:    #2a3045;
    --accent:    #4f8ef7;
    --accent2:   #2fd6c3;
    --danger:    #e05a5a;
    --warn:      #f0a04e;
    --text:      #d8dff0;
    --muted:     #6b7599;
    --font-head: 'Syne', sans-serif;
    --font-body: 'DM Mono', monospace;
    --radius:    8px;
    --shadow:    0 4px 24px rgba(0,0,0,.45);
  }

  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@600;800&family=DM+Mono:wght@300;400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 13px;
    min-height: 100vh;
  }

  /* ── Header bar ────────────────────────────────────────── */
  #topbar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    box-shadow: var(--shadow);
  }

  #topbar-inner {
    max-width: 1600px;
    margin: 0 auto;
  }

  .brand {
    font-family: var(--font-head);
    font-size: 18px;
    font-weight: 800;
    color: var(--accent);
    letter-spacing: -.5px;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .brand span { color: var(--accent2); }

  .controls-row {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: flex-end;
  }

  .ctrl-group {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .ctrl-label {
    font-size: 10px;
    font-weight: 500;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .08em;
  }

  input[type="text"], select {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 13px;
    padding: 7px 12px;
    outline: none;
    transition: border .15s;
    min-width: 220px;
  }
  input[type="text"]:focus, select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(79,142,247,.18);
  }
  select { cursor: pointer; }

  /* autocomplete dropdown */
  .autocomplete-wrap { position: relative; }
  .autocomplete-list {
    position: absolute;
    top: calc(100% + 4px);
    left: 0;
    right: 0;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    max-height: 260px;
    overflow-y: auto;
    z-index: 200;
    box-shadow: var(--shadow);
    display: none;
  }
  .autocomplete-list.open { display: block; }
  .ac-item {
    padding: 8px 12px;
    cursor: pointer;
    border-bottom: 1px solid var(--border);
    transition: background .1s;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .ac-item:last-child { border-bottom: none; }
  .ac-item:hover, .ac-item.active { background: var(--accent); color: #fff; }

  /* status bar */
  #statusbar {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
    font-size: 11px;
    color: var(--muted);
  }
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2px 10px;
    font-size: 11px;
    white-space: nowrap;
  }
  .badge-accent { border-color: var(--accent); color: var(--accent); }
  .badge-green  { border-color: var(--accent2); color: var(--accent2); }
  .badge-warn   { border-color: var(--warn);   color: var(--warn); }

  .btn-clear {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--muted);
    font-family: var(--font-body);
    font-size: 11px;
    padding: 4px 10px;
    cursor: pointer;
    transition: all .15s;
  }
  .btn-clear:hover { border-color: var(--danger); color: var(--danger); }

  /* ── Main container ─────────────────────────────────────── */
  #main {
    max-width: 1600px;
    margin: 0 auto;
    padding: 20px 24px 60px;
  }

  /* ── Loading / error ──────────────────────────────────── */
  #loader {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 80px 24px;
    color: var(--muted);
  }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  #error-box {
    display: none;
    background: rgba(224,90,90,.1);
    border: 1px solid var(--danger);
    border-radius: var(--radius);
    padding: 20px 24px;
    color: var(--danger);
    margin-top: 20px;
    line-height: 1.7;
  }

  /* ── Table ─────────────────────────────────────────────── */
  #table-wrap {
    display: none;
    overflow-x: auto;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  thead th {
    position: sticky;
    top: 0; /* will be offset via JS for topbar height */
    background: var(--surface2);
    padding: 10px 14px;
    text-align: left;
    font-family: var(--font-head);
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .1em;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
    user-select: none;
  }
  thead th:hover { color: var(--text); cursor: default; }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background .1s;
  }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--surface2); }

  td {
    padding: 9px 14px;
    vertical-align: middle;
    white-space: nowrap;
  }

  .td-sku { font-weight: 500; color: var(--accent); letter-spacing: .04em; }
  .td-sku.out-of-stock { color: #8c3a3a !important; }

  .td-name { max-width: 320px; white-space: normal; line-height: 1.4; color: var(--text); }
  .td-price { font-weight: 500; color: var(--accent2); }
  .td-size  { color: var(--muted); }
  .td-stock { color: var(--text); }
  .td-stock.zero { color: var(--danger); font-weight: 500; }

  .upsell-link {
    display: inline-block;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1px 7px;
    font-size: 11px;
    color: var(--warn);
    cursor: pointer;
    margin: 1px 2px;
    transition: all .12s;
    text-decoration: none;
  }
  .upsell-link:hover {
    background: var(--warn);
    color: #000;
    border-color: var(--warn);
  }

  .btn-top {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--muted);
    font-family: var(--font-body);
    font-size: 11px;
    padding: 3px 9px;
    cursor: pointer;
    transition: all .12s;
  }
  .btn-top:hover { border-color: var(--accent); color: var(--accent); }

  /* empty state */
  #empty-state {
    display: none;
    text-align: center;
    padding: 60px 24px;
    color: var(--muted);
    font-size: 15px;
  }
  #empty-state p { margin-top: 8px; font-size: 12px; }

  /* ── Scrollbar ─────────────────────────────────────────── */
  ::-webkit-scrollbar { width: 7px; height: 7px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

  /* ── Responsive tweaks ─────────────────────────────────── */
  @media (max-width: 700px) {
    #topbar { padding: 10px 12px; }
    #main   { padding: 14px 8px 60px; }
    input[type="text"], select { min-width: 160px; font-size: 12px; }
    td, thead th { padding: 7px 9px; font-size: 11px; }
  }
</style>
</head>
<body>

<!-- ═══════════════ TOP BAR ═══════════════ -->
<header id="topbar">
  <div id="topbar-inner">
    <div class="brand">Árlista<span>.</span></div>

    <div class="controls-row">

      <!-- Vevő kereső / autocomplete -->
      <div class="ctrl-group">
        <span class="ctrl-label">Vevő</span>
        <div class="autocomplete-wrap">
          <input type="text" id="customer-input" placeholder="Vevő neve…" autocomplete="off">
          <div class="autocomplete-list" id="customer-list"></div>
        </div>
      </div>

      <!-- SKU kereső -->
      <div class="ctrl-group">
        <span class="ctrl-label">Cikkszám keresés</span>
        <input type="text" id="sku-search" placeholder="pl. KR124…" autocomplete="off">
      </div>

      <!-- Szűrés törlése -->
      <div class="ctrl-group" style="justify-content:flex-end; flex-direction:row; gap:6px; align-self:flex-end;">
        <button class="btn-clear" id="btn-clear-upsell" style="display:none">✕ Upsell szűrés</button>
        <button class="btn-clear" id="btn-clear-sku">✕ Keresés</button>
        <button class="btn-clear" id="btn-reset-all">⟳ Teljes lista</button>
      </div>

    </div><!-- /controls-row -->

    <!-- Aktív állapot sáv -->
    <div id="statusbar">
      <span id="st-count" class="badge">— termék</span>
      <span id="st-customer" class="badge badge-accent" style="display:none"></span>
      <span id="st-arsor"    class="badge badge-green"  style="display:none"></span>
      <span id="st-upsell"   class="badge badge-warn"   style="display:none"></span>
    </div>
  </div>
</header>

<!-- ═══════════════ MAIN ═══════════════ -->
<div id="main">

  <!-- Betöltési állapot -->
  <div id="loader">
    <div class="spinner"></div>
    <div>Adatfájlok betöltése…</div>
  </div>

  <!-- Hibaüzenet -->
  <div id="error-box"></div>

  <!-- Üres állapot (vevő nem választott) -->
  <div id="empty-state">
    🔍 Válassz vevőt a lista megjelenítéséhez!
    <p>A vevő kiválasztása után megjelenik a megfelelő árlista.</p>
  </div>

  <!-- Táblázat -->
  <div id="table-wrap">
    <table id="price-table">
      <thead>
        <tr>
          <th>SKU</th>
          <th>Cikknév</th>
          <th>Méret</th>
          <th>Készleten</th>
          <th>Ár</th>
          <th>Upsell</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="price-tbody"></tbody>
    </table>
  </div>

</div><!-- /main -->

<script>
/* ══════════════════════════════════════════════════════════════════
   CONFIG – az URL-eket itt lehet könnyen módosítani
══════════════════════════════════════════════════════════════════ */
const CONFIG = {
  CUSTOMER_URL: 'https://app.clouderp.hu/api/1/automatism/file-share/?s=Z0FBQUFBQnByX1NMTmlManAzeV9WMy03a0ZaZE5WRF9TTWF2QjBjT1pfeWhmV1NPbl9IV080bHZmbEJPZm1xWUticWdwM1pfV0s1X0ZDUUx4ZmR6QTJaOTVmbm51d2RSeVN6VFdEVlhsMGstb0ZVbUxuWC10VFk9',
  PRICELIST_URL:'https://app.clouderp.hu/api/1/automatism/file-share/?s=Z0FBQUFBQnByX1ExZkFLeWtTWlJybUFDUDY1QkVwc2pHeE5zVW1qSUJlTjdHcUlwLWkyVXhudmYzRHQ5aEk2Zk9yLWNKMWRfNU9HYmh0VklTdlcwdGZfN0RHbmFfMlpLY2xMbzk2elFyM2Y0eDNNdkpFcW1rLVU9',
  STOCK_URL:    'STOCK_FILE_URL_HERE', // ← 3. fájl URL-je ide kerül
};

/* ══════════════════════════════════════════════════════════════════
   GLOBALS
══════════════════════════════════════════════════════════════════ */
let customers    = [];   // [{name, groups:[]}]
let priceRows    = [];   // [{sku, name, price, arsor, upsellRaw}]
let stockMap     = {};   // normSKU → {size, stock}
let upsellIndex  = {};   // normSKU → Set of normSKUs in same upsell group
let skuMap       = {};   // normSKU → priceRow  (performance index)

let selectedCustomer = null;  // customer object
let activeArsor      = null;  // string, e.g. "arsor1"
let filteredRows     = [];    // currently shown rows
let upsellFilter     = null;  // Set of normSKUs, or null
let skuSearchVal     = '';

/* ══════════════════════════════════════════════════════════════════
   UTILITY
══════════════════════════════════════════════════════════════════ */

/** Normalize SKU: uppercase, remove spaces and non-alphanumeric chars */
function normalizeSKU(raw) {
  if (!raw) return '';
  return String(raw).toUpperCase().replace(/[^A-Z0-9]/g, '');
}

/** Find a value in a row object using a list of possible key names (case-insensitive) */
function findField(obj, candidates) {
  const keys = Object.keys(obj);
  for (const c of candidates) {
    const cl = c.toLowerCase();
    const match = keys.find(k => k.toLowerCase() === cl);
    if (match !== undefined && obj[match] !== undefined && obj[match] !== null && obj[match] !== '') {
      return obj[match];
    }
  }
  // Try partial match as fallback
  for (const c of candidates) {
    const cl = c.toLowerCase();
    const match = keys.find(k => k.toLowerCase().includes(cl));
    if (match !== undefined) return obj[match];
  }
  return null;
}

/* ══════════════════════════════════════════════════════════════════
   FILE LOADING
══════════════════════════════════════════════════════════════════ */

/** Fetch a URL and parse it as an Excel workbook → returns first sheet as array of objects */
async function fetchExcel(url) {
  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status}: ${url}`);
  const buf  = await res.arrayBuffer();
  const wb   = XLSX.read(buf, { type: 'array' });
  const ws   = wb.Sheets[wb.SheetNames[0]];
  return XLSX.utils.sheet_to_json(ws, { defval: '' });
}

/** Show error message */
function showError(msg) {
  const box = document.getElementById('error-box');
  box.style.display = 'block';
  box.innerHTML = msg;
  document.getElementById('loader').style.display = 'none';
}

/* ══════════════════════════════════════════════════════════════════
   CUSTOMER PARSING
══════════════════════════════════════════════════════════════════ */

/**
 * Parse customer data.
 * Expected columns: partner name + group columns (may be separate rows or
 * a comma-joined cell). We try both layouts.
 */
function parseCustomers(rows) {
  const result = [];
  for (const row of rows) {
    const name = findField(row, ['nev','név','name','partner','vevo','vevő','ugyfel','ügyfél','customer']);
    if (!name) continue;

    // Groups: try a 'groups', 'csoportok', 'group', 'csoport' column first
    let groupRaw = findField(row, ['groups','csoportok','group','csoport','tag','tags','kategoria','kategória']);
    let groups = [];

    if (groupRaw) {
      groups = String(groupRaw).split(/[,;|\n]+/).map(s => s.trim()).filter(Boolean);
    } else {
      // Fallback: collect all column values that look like group names
      Object.values(row).forEach(v => {
        const s = String(v).trim();
        if (s && s !== name) groups.push(s);
      });
    }

    result.push({ name: String(name).trim(), groups });
  }
  return result;
}

/* ══════════════════════════════════════════════════════════════════
   PRICE LIST PARSING
══════════════════════════════════════════════════════════════════ */

/**
 * Parse price list rows.
 * Returns array of {sku, normSku, name, price, arsor, upsellRaw}
 */
function parsePriceList(rows) {
  const result = [];
  for (const row of rows) {
    const skuRaw  = findField(row, ['sku','cikkszam','cikkszám','kod','kód','code','item','termek','termék','article']);
    if (!skuRaw) continue;

    const name    = findField(row, ['cikknev','cikknév','name','megnevezes','megnevezés','leiras','leírás','nev','név','description','product']);
    const price   = findField(row, ['ar','ár','price','net','netto','nettó','vat_exc','bruttoar','bruttóár']);
    const arsor   = findField(row, ['arsor','árlista','arlistacsoport','árlistacsoport','pricelist','price_group','pricegroup','lista','listaar','listaár']);
    const upsell  = findField(row, ['upsell','cross','kapcsolodo','kapcsolódó','related','also','addons','addon']);

    result.push({
      sku:       String(skuRaw).trim(),
      normSku:   normalizeSKU(skuRaw),
      name:      String(name  || '').trim(),
      price:     price !== null && price !== '' ? price : null,
      arsor:     String(arsor || '').trim(),
      upsellRaw: String(upsell || '').trim(),
    });
  }
  return result;
}

/* ══════════════════════════════════════════════════════════════════
   STOCK PARSING
══════════════════════════════════════════════════════════════════ */

function parseStock(rows) {
  const map = {};
  for (const row of rows) {
    const skuRaw = findField(row, ['sku','cikkszam','cikkszám','kod','kód','code','item','termek','termék']);
    if (!skuRaw) continue;
    const normSku = normalizeSKU(skuRaw);
    const size    = findField(row, ['meret','méret','size','dimension','dim']);
    const stock   = findField(row, ['keszlet','készlet','stock','qty','mennyiseg','mennyiség','available','raktaron','raktáron']);
    map[normSku]  = {
      size:  size  !== null && size  !== '' ? String(size)  : null,
      stock: stock !== null && stock !== '' ? String(stock) : null,
    };
  }
  return map;
}

/* ══════════════════════════════════════════════════════════════════
   ARSOR GROUP SELECTION
══════════════════════════════════════════════════════════════════ */

/**
 * From a list of group strings, find the first that starts with 'arsor' (case-insensitive).
 */
function selectArsorGroup(groups) {
  if (!groups || !groups.length) return null;
  const hit = groups.find(g => g.toLowerCase().startsWith('arsor'));
  return hit || null;
}

/* ══════════════════════════════════════════════════════════════════
   UPSELL INDEX BUILDING
══════════════════════════════════════════════════════════════════ */

/**
 * Build a upsell index: for each normSKU → Set of all normSKUs in its upsell group.
 * If A has upsell "B,C" then A,B,C all share the same group.
 * We use Union-Find / merge approach.
 */
function buildUpsellIndex(rows) {
  const idx = {};  // normSKU → Set

  for (const row of rows) {
    if (!row.upsellRaw) continue;
    const linked = row.upsellRaw.split(/[,;|\s]+/)
                    .map(s => normalizeSKU(s.trim()))
                    .filter(Boolean);
    if (!linked.length) continue;

    // Collect all SKUs in this connection: the row's own SKU + linked
    const all = [row.normSku, ...linked].filter(Boolean);

    // Find or create the merged set
    let mergedSet = new Set();
    for (const s of all) {
      if (idx[s]) mergedSet = new Set([...mergedSet, ...idx[s]]);
    }
    for (const s of all) mergedSet.add(s);

    // Assign merged set back to all members
    for (const s of mergedSet) idx[s] = mergedSet;
  }

  return idx;
}

/* ══════════════════════════════════════════════════════════════════
   SKU MAP (performance index)
══════════════════════════════════════════════════════════════════ */

function buildSkuMap(rows) {
  const map = {};
  for (const row of rows) {
    map[row.normSku] = row;
  }
  return map;
}

/* ══════════════════════════════════════════════════════════════════
   FILTER LOGIC
══════════════════════════════════════════════════════════════════ */

/** Filter priceRows to those matching the active arsor group */
function getArsorRows(arsor) {
  if (!arsor) return [];
  const lc = arsor.toLowerCase();
  return priceRows.filter(r => r.arsor && r.arsor.toLowerCase() === lc);
}

/** Apply SKU search filter */
function applySkuSearch(rows, query) {
  if (!query) return rows;
  const q = normalizeSKU(query);
  if (!q) return rows;
  return rows.filter(r => r.normSku.includes(q));
}

/** Apply upsell filter */
function applyUpsellFilter(rows, upsellSet) {
  if (!upsellSet) return rows;
  return rows.filter(r => upsellSet.has(r.normSku));
}

/* ══════════════════════════════════════════════════════════════════
   TABLE RENDERING
══════════════════════════════════════════════════════════════════ */

function formatPrice(val) {
  if (val === null || val === '' || val === undefined) return '—';
  const n = parseFloat(String(val).replace(/[^0-9.,]/g, '').replace(',', '.'));
  if (isNaN(n)) return String(val);
  return n.toLocaleString('hu-HU') + ' Ft';
}

function renderTable(rows) {
  const tbody = document.getElementById('price-tbody');
  const wrap  = document.getElementById('table-wrap');
  const empty = document.getElementById('empty-state');

  // Update status
  document.getElementById('st-count').textContent = rows.length + ' termék';

  if (!rows.length) {
    wrap.style.display  = 'none';
    empty.style.display = 'block';
    empty.innerHTML = '🔍 Nincs találat.<p>Próbálj más keresési feltételt.</p>';
    return;
  }

  empty.style.display = 'none';
  wrap.style.display  = 'block';

  // Build HTML in one pass for performance
  const fragments = [];
  for (const row of rows) {
    const si       = stockMap[row.normSku] || {};
    const size     = si.size  !== null && si.size  !== undefined ? si.size  : '—';
    const stockVal = si.stock !== null && si.stock !== undefined ? si.stock : '—';
    const stockNum = parseFloat(stockVal);
    const isOut    = !isNaN(stockNum) && stockNum <= 0;

    const skuClass = 'td-sku' + (isOut ? ' out-of-stock' : '');
    const stClass  = 'td-stock' + (isOut ? ' zero' : '');

    // Upsell pills
    let upsellHtml = '—';
    if (row.upsellRaw) {
      const pills = row.upsellRaw.split(/[,;|\s]+/)
        .map(s => normalizeSKU(s.trim()))
        .filter(Boolean);
      if (pills.length) {
        upsellHtml = pills.map(ns =>
          `<a class="upsell-link" data-sku="${ns}" title="Upsell: ${ns}">${ns}</a>`
        ).join('');
      }
    }

    fragments.push(
      `<tr>` +
      `<td class="${skuClass}">${escHtml(row.sku)}</td>` +
      `<td class="td-name">${escHtml(row.name)}</td>` +
      `<td class="td-size">${escHtml(String(size))}</td>` +
      `<td class="${stClass}">${escHtml(String(stockVal))}</td>` +
      `<td class="td-price">${formatPrice(row.price)}</td>` +
      `<td>${upsellHtml}</td>` +
      `<td><button class="btn-top" onclick="scrollToTop()">↑ Fel</button></td>` +
      `</tr>`
    );
  }

  tbody.innerHTML = fragments.join('');

  // Delegate click on upsell links
  tbody.querySelectorAll('.upsell-link').forEach(el => {
    el.addEventListener('click', (e) => {
      const ns = e.currentTarget.dataset.sku;
      applyUpsellClick(ns);
    });
  });
}

function escHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

/* ══════════════════════════════════════════════════════════════════
   UPSELL CLICK HANDLER
══════════════════════════════════════════════════════════════════ */

function applyUpsellClick(normSku) {
  const group = upsellIndex[normSku];
  if (!group || !group.size) return;
  upsellFilter = group;

  updateStatusBar();
  document.getElementById('btn-clear-upsell').style.display = '';
  rerenderFiltered();
}

/* ══════════════════════════════════════════════════════════════════
   RE-RENDER PIPELINE
══════════════════════════════════════════════════════════════════ */

function rerenderFiltered() {
  let rows = getArsorRows(activeArsor);
  rows = applyUpsellFilter(rows, upsellFilter);
  rows = applySkuSearch(rows, skuSearchVal);
  filteredRows = rows;
  renderTable(rows);
}

/* ══════════════════════════════════════════════════════════════════
   STATUS BAR UPDATE
══════════════════════════════════════════════════════════════════ */

function updateStatusBar() {
  const sc = document.getElementById('st-customer');
  const sa = document.getElementById('st-arsor');
  const su = document.getElementById('st-upsell');

  if (selectedCustomer) {
    sc.textContent = '👤 ' + selectedCustomer.name;
    sc.style.display = '';
  } else {
    sc.style.display = 'none';
  }

  if (activeArsor) {
    sa.textContent = '📋 ' + activeArsor;
    sa.style.display = '';
  } else {
    sa.style.display = 'none';
  }

  if (upsellFilter) {
    su.textContent = '🔗 Upsell szűrés aktív (' + upsellFilter.size + ' termék)';
    su.style.display = '';
  } else {
    su.style.display = 'none';
  }
}

/* ══════════════════════════════════════════════════════════════════
   CUSTOMER SELECTION
══════════════════════════════════════════════════════════════════ */

function selectCustomer(customer) {
  selectedCustomer = customer;
  activeArsor = selectArsorGroup(customer.groups);
  upsellFilter = null;
  skuSearchVal = '';
  document.getElementById('sku-search').value = '';
  document.getElementById('btn-clear-upsell').style.display = 'none';

  updateStatusBar();

  if (!activeArsor) {
    document.getElementById('table-wrap').style.display = 'none';
    document.getElementById('empty-state').style.display = 'block';
    document.getElementById('empty-state').innerHTML =
      '⚠️ Ehhez a vevőhöz nem található <em>arsor</em> csoport.<p>Ellenőrizd az adatokat!</p>';
    document.getElementById('st-count').textContent = '0 termék';
    return;
  }

  rerenderFiltered();
}

/* ══════════════════════════════════════════════════════════════════
   AUTOCOMPLETE
══════════════════════════════════════════════════════════════════ */

function setupAutocomplete() {
  const input = document.getElementById('customer-input');
  const list  = document.getElementById('customer-list');
  let activeIdx = -1;
  let currentMatches = [];

  function showList(matches) {
    currentMatches = matches;
    activeIdx = -1;
    list.innerHTML = '';
    if (!matches.length) { list.classList.remove('open'); return; }
    matches.slice(0, 60).forEach((c, i) => {
      const div = document.createElement('div');
      div.className = 'ac-item';
      div.textContent = c.name;
      div.addEventListener('click', () => {
        input.value = c.name;
        list.classList.remove('open');
        selectCustomer(c);
      });
      list.appendChild(div);
    });
    list.classList.add('open');
  }

  input.addEventListener('input', () => {
    const q = input.value.trim().toLowerCase();
    if (!q) { showList(customers.slice(0, 60)); return; }
    showList(customers.filter(c => c.name.toLowerCase().includes(q)));
  });

  input.addEventListener('focus', () => {
    const q = input.value.trim().toLowerCase();
    showList(q ? customers.filter(c => c.name.toLowerCase().includes(q)) : customers.slice(0, 60));
  });

  input.addEventListener('keydown', (e) => {
    const items = list.querySelectorAll('.ac-item');
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      activeIdx = Math.min(activeIdx + 1, items.length - 1);
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      activeIdx = Math.max(activeIdx - 1, 0);
    } else if (e.key === 'Enter') {
      e.preventDefault();
      if (activeIdx >= 0 && currentMatches[activeIdx]) {
        input.value = currentMatches[activeIdx].name;
        list.classList.remove('open');
        selectCustomer(currentMatches[activeIdx]);
        return;
      }
      // Try exact match
      const q = input.value.trim().toLowerCase();
      const exact = customers.find(c => c.name.toLowerCase() === q);
      if (exact) { selectCustomer(exact); list.classList.remove('open'); }
    } else if (e.key === 'Escape') {
      list.classList.remove('open');
    } else {
      return;
    }
    items.forEach((el, i) => el.classList.toggle('active', i === activeIdx));
    if (activeIdx >= 0 && items[activeIdx]) {
      items[activeIdx].scrollIntoView({ block: 'nearest' });
    }
  });

  document.addEventListener('click', (e) => {
    if (!e.target.closest('.autocomplete-wrap')) list.classList.remove('open');
  });
}

/* ══════════════════════════════════════════════════════════════════
   SKU SEARCH
══════════════════════════════════════════════════════════════════ */

function setupSkuSearch() {
  const input = document.getElementById('sku-search');
  let timer;
  input.addEventListener('input', () => {
    clearTimeout(timer);
    timer = setTimeout(() => {
      skuSearchVal = input.value.trim();
      if (selectedCustomer) rerenderFiltered();
    }, 180);
  });
}

/* ══════════════════════════════════════════════════════════════════
   CLEAR / RESET BUTTONS
══════════════════════════════════════════════════════════════════ */

function setupButtons() {
  document.getElementById('btn-clear-upsell').addEventListener('click', () => {
    upsellFilter = null;
    document.getElementById('btn-clear-upsell').style.display = 'none';
    updateStatusBar();
    if (selectedCustomer) rerenderFiltered();
  });

  document.getElementById('btn-clear-sku').addEventListener('click', () => {
    skuSearchVal = '';
    document.getElementById('sku-search').value = '';
    if (selectedCustomer) rerenderFiltered();
  });

  document.getElementById('btn-reset-all').addEventListener('click', () => {
    upsellFilter = null;
    skuSearchVal = '';
    document.getElementById('sku-search').value = '';
    document.getElementById('customer-input').value = '';
    document.getElementById('btn-clear-upsell').style.display = 'none';
    selectedCustomer = null;
    activeArsor = null;
    document.getElementById('table-wrap').style.display  = 'none';
    document.getElementById('empty-state').style.display = 'block';
    document.getElementById('empty-state').innerHTML = '🔍 Válassz vevőt a lista megjelenítéséhez!<p>A vevő kiválasztása után megjelenik a megfelelő árlista.</p>';
    document.getElementById('st-count').textContent = '— termék';
    updateStatusBar();
  });
}

/* ══════════════════════════════════════════════════════════════════
   SCROLL TO TOP
══════════════════════════════════════════════════════════════════ */

function scrollToTop() {
  window.scrollTo({ top: 0, behavior: 'smooth' });
  setTimeout(() => document.getElementById('customer-input').focus(), 400);
}

/* ══════════════════════════════════════════════════════════════════
   STICKY HEADER OFFSET  (offset thead to sit below topbar)
══════════════════════════════════════════════════════════════════ */

function updateStickyOffset() {
  const h = document.getElementById('topbar').offsetHeight;
  document.querySelectorAll('thead th').forEach(th => {
    th.style.top = h + 'px';
  });
}

/* ══════════════════════════════════════════════════════════════════
   MAIN INIT
══════════════════════════════════════════════════════════════════ */

async function init() {
  try {
    // Load all Excel files in parallel
    const promises = [
      fetchExcel(CONFIG.CUSTOMER_URL),
      fetchExcel(CONFIG.PRICELIST_URL),
    ];

    // Stock file: only if URL is set
    let stockPromise = null;
    if (CONFIG.STOCK_URL && CONFIG.STOCK_URL !== 'STOCK_FILE_URL_HERE') {
      stockPromise = fetchExcel(CONFIG.STOCK_URL).catch(e => {
        console.warn('Készlet fájl betöltési hiba:', e);
        return [];
      });
    }

    let [customerRows, priceListRows] = await Promise.all(promises);

    // Stock
    if (stockPromise) {
      const stockRows = await stockPromise;
      stockMap = parseStock(stockRows);
    }

    // Parse
    customers = parseCustomers(customerRows);
    if (!customers.length) throw new Error('Nem sikerült vevőadatokat beolvasni. Ellenőrizd az Excel struktúrát!');

    priceRows = parsePriceList(priceListRows);
    if (!priceRows.length) throw new Error('Nem sikerült termékadatokat beolvasni. Ellenőrizd az árlista Excel struktúrát!');

    // Build indexes
    skuMap      = buildSkuMap(priceRows);
    upsellIndex = buildUpsellIndex(priceRows);

    // Sort customers alphabetically
    customers.sort((a, b) => a.name.localeCompare(b.name, 'hu'));

    // Hide loader
    document.getElementById('loader').style.display = 'none';
    document.getElementById('empty-state').style.display = 'block';

    // Setup UI
    setupAutocomplete();
    setupSkuSearch();
    setupButtons();
    updateStickyOffset();
    window.addEventListener('resize', updateStickyOffset);

    console.log(`✅ Betöltve: ${customers.length} vevő, ${priceRows.length} termék`);

  } catch (err) {
    document.getElementById('loader').style.display = 'none';
    let msg = `<strong>Hiba a fájlok betöltésekor:</strong><br>${escHtml(err.message)}`;
    if (err.message.includes('CORS') || err.message.includes('NetworkError') || err.message.includes('Failed to fetch')) {
      msg += `<br><br>⚠️ <strong>CORS hiba:</strong> A böngésző biztonsági szabályai megakadályozzák a fájlok betöltését erről az URL-ről.<br>
      Lehetséges megoldások:<ul>
        <li>Ellenőrizd, hogy a fájl URL-ek nyilvánosan elérhetők-e</li>
        <li>Az API végpontnak CORS fejléceket kell küldenie (<code>Access-Control-Allow-Origin: *</code>)</li>
        <li>Vagy töltsd be a fájlokat ugyanonnan (GitHub Pages), ahonnan ez az oldal fut</li>
      </ul>`;
    }
    showError(msg);
  }
}

// Start
document.addEventListener('DOMContentLoaded', init);
</script>
