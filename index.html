<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vevőspecifikus Árlista</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');

  :root {
    --bg: #0e0f11;
    --surface: #16181c;
    --surface2: #1e2128;
    --border: #2a2d35;
    --border2: #363b47;
    --accent: #e8c547;
    --accent2: #f0d96a;
    --text: #e2e4ea;
    --text-muted: #7a8099;
    --text-dim: #4a5068;
    --green: #4ade80;
    --red: #ff6b6b;
    --red-dim: #7a2a2a;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    min-height: 100vh;
  }

  /* ── HEADER ── */
  .header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }

  .logo {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    white-space: nowrap;
    margin-right: 8px;
  }

  .logo span {
    color: var(--text-muted);
    font-weight: 400;
  }

  .ctrl-group {
    display: flex;
    align-items: center;
    gap: 8px;
    flex: 1;
    min-width: 200px;
  }

  .ctrl-label {
    font-size: 11px;
    font-family: var(--mono);
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    white-space: nowrap;
  }

  select, input[type="text"] {
    background: var(--surface2);
    border: 1px solid var(--border2);
    color: var(--text);
    font-family: var(--sans);
    font-size: 13px;
    padding: 7px 11px;
    border-radius: 6px;
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
    min-width: 0;
    flex: 1;
  }

  select:focus, input[type="text"]:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(232,197,71,0.15);
  }

  select option { background: var(--surface2); }

  .status-bar {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    margin-left: auto;
    white-space: nowrap;
  }

  .status-bar .hl { color: var(--accent); font-weight: 600; }

  /* ── FILTER BAR ── */
  .filter-bar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 8px 24px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: var(--mono);
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 4px;
    background: var(--surface2);
    border: 1px solid var(--border2);
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.12s;
    user-select: none;
  }
  .chip:hover { border-color: var(--accent); color: var(--accent); }
  .chip.active { background: rgba(232,197,71,0.12); border-color: var(--accent); color: var(--accent2); }
  .chip .close { font-size: 13px; line-height: 1; color: var(--text-dim); }
  .chip.active .close { color: var(--accent); }

  .filter-label {
    font-size: 11px;
    font-family: var(--mono);
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  /* ── TABLE ── */
  .table-wrap {
    padding: 0 24px 40px;
    overflow-x: auto;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
  }

  thead {
    position: sticky;
    top: 57px;
    z-index: 50;
  }

  thead tr {
    background: var(--surface);
    border-bottom: 2px solid var(--border2);
  }

  th {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-muted);
    padding: 10px 12px;
    text-align: left;
    white-space: nowrap;
    user-select: none;
  }

  th:first-child { width: 120px; }
  th:nth-child(2) { width: auto; min-width: 200px; }
  th:nth-child(3) { width: 80px; }
  th:nth-child(4) { width: 90px; }
  th:nth-child(5) { width: 100px; text-align: right; }
  th:nth-child(6) { width: 180px; }
  th:nth-child(7) { width: 50px; text-align: center; }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }
  tbody tr:hover { background: var(--surface); }
  tbody tr:hover td { color: var(--text); }

  td {
    padding: 9px 12px;
    color: #c5c8d6;
    vertical-align: middle;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .sku-cell {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: 0.04em;
  }
  .sku-cell.out-of-stock { color: var(--red); }

  .name-cell {
    font-size: 13px;
    color: var(--text);
  }

  .size-cell {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-muted);
  }

  .stock-cell {
    font-family: var(--mono);
    font-size: 12px;
    text-align: right;
  }
  .stock-zero { color: var(--red); }
  .stock-ok { color: var(--green); }
  .stock-dash { color: var(--text-dim); }

  .price-cell {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    color: var(--accent2);
    text-align: right;
    letter-spacing: 0.02em;
  }
  .price-dash { color: var(--text-dim); font-weight: 400; }

  .upsell-cell {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
    align-items: center;
  }

  .upsell-tag {
    font-family: var(--mono);
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 3px;
    background: rgba(232,197,71,0.08);
    border: 1px solid rgba(232,197,71,0.25);
    color: #c9ab3a;
    cursor: pointer;
    transition: all 0.12s;
    text-decoration: none;
    white-space: nowrap;
  }
  .upsell-tag:hover {
    background: rgba(232,197,71,0.2);
    border-color: var(--accent);
    color: var(--accent2);
  }

  .btn-up {
    background: var(--surface2);
    border: 1px solid var(--border2);
    color: var(--text-muted);
    font-family: var(--mono);
    font-size: 10px;
    padding: 4px 8px;
    border-radius: 4px;
    cursor: pointer;
    display: block;
    margin: 0 auto;
    transition: all 0.12s;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .btn-up:hover { border-color: var(--accent); color: var(--accent); }

  /* ── STATES ── */
  .state-box {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 80px 24px;
    text-align: center;
  }

  .state-icon {
    font-size: 40px;
    opacity: 0.25;
  }

  .state-title {
    font-family: var(--mono);
    font-size: 14px;
    color: var(--text-muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .state-sub {
    font-size: 13px;
    color: var(--text-dim);
    max-width: 340px;
  }

  /* ── LOADING ── */
  .loader {
    display: inline-block;
    width: 18px;
    height: 18px;
    border: 2px solid var(--border2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .progress-bar {
    width: 220px;
    height: 3px;
    background: var(--border2);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.3s ease;
    width: 0%;
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 700px) {
    .header { padding: 10px 14px; gap: 10px; }
    .table-wrap { padding: 0 8px 40px; }
    td, th { padding: 8px 7px; }
    th:nth-child(2) { min-width: 140px; }
    .logo { display: none; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header" id="top">
  <div class="logo">Árlista<span>·sys</span></div>

  <div class="ctrl-group" style="max-width:280px;">
    <span class="ctrl-label">Vevő</span>
    <select id="customerSelect">
      <option value="">— Betöltés… —</option>
    </select>
  </div>

  <div class="ctrl-group" style="max-width:260px;">
    <span class="ctrl-label">Cikkszám</span>
    <input type="text" id="skuSearch" placeholder="Keresés…" autocomplete="off" spellcheck="false">
  </div>

  <div class="status-bar" id="statusBar">
    <span id="loadStatus">Adatok betöltése…</span>
  </div>
</div>

<!-- FILTER BAR (upsell active) -->
<div class="filter-bar" id="filterBar" style="display:none;">
  <span class="filter-label">Szűrő:</span>
  <span class="chip active" id="upsellChip">
    Upsell csoport: <strong id="upsellChipLabel"></strong>
    <span class="close" id="clearUpsell">✕</span>
  </span>
</div>

<!-- CONTENT -->
<div class="table-wrap" id="contentArea">
  <div class="state-box" id="stateBox">
    <div class="loader"></div>
    <div class="state-title">Adatok betöltése</div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="state-sub" id="stateMsg">Kapcsolódás az adatforrásokhoz…</div>
  </div>
  <table id="priceTable" style="display:none;">
    <thead>
      <tr>
        <th>SKU</th>
        <th>Cikknév</th>
        <th>Méret</th>
        <th style="text-align:right;">Készleten</th>
        <th style="text-align:right;">Ár</th>
        <th>Upsell</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<script>
// ═══════════════════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════════════════
const URLS = {
  customers: 'https://app.clouderp.hu/api/1/automatism/file-share/?s=Z0FBQUFBQnByX1NMTmlManAzeV9WMy03a0ZaZE5WRF9TTWF2QjBjT1pfeWhmV1NPbl9IV080bHZmbEJPZm1xWUticWdwM1pfV0s5X0ZDUUx4ZmR6QTJaOTVmbm51d2RSeVN6VFdEVlhsMGstb0ZVbUxuWC10VFk9',
  prices:    'https://app.clouderp.hu/api/1/automatism/file-share/?s=Z0FBQUFBQnByX1ExZkFLeWtTWlJybUFDUDY1QkVwc2pHeE5zVW1qSUJlTjdHcUlwLWkyVXhudmYzRHQ5aEk2Zk9yLWNKMWRfNU9HYmh0VklTdlcwdGZfN0RHbmFfMlpLY2xMbzk2elFyM2Y0eDNNdkpFcW1rLVU9',
  stock:     'https://app.clouderp.hu/api/1/automatism/file-share/?s=Z0FBQUFBQnByX1NMTmlManAzeV9WMy03a0ZaZE5WRF9TTWF2QjBjT1pfeWhmV1NPbl9IV080bHZmbEJPZm1xWUticWdwM1pfV0s1X0ZDUUx4ZmR6QTJaOTVmbm51d2RSeVN6VFdEVlhsMGstb0ZVbUxuWC10VFk9'
};

// ═══════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════
let rawCustomers = [];   // [{name, groups:[]}]
let rawPrices    = {};   // { arsorKey: [{sku, name, price, upsell}] }
let stockMap     = {};   // { normalizedSku: [{size, stock}] }
let skuIndex     = {};   // { normalizedSku: priceRow }

let currentCustomer = null;
let currentArsor    = null;
let currentRows     = [];   // filtered display rows
let upsellFilter    = null; // Set of normalized SKUs or null
let searchQuery     = '';

// ═══════════════════════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════════════════════
function normalizeSKU(sku) {
  if (!sku) return '';
  return String(sku).toUpperCase().replace(/[^A-Z0-9]/g, '');
}

function setProgress(pct, msg) {
  document.getElementById('progressFill').style.width = pct + '%';
  if (msg) document.getElementById('stateMsg').textContent = msg;
}

function setStatus(html) {
  document.getElementById('loadStatus').innerHTML = html;
}

function showState(icon, title, sub) {
  const sb = document.getElementById('stateBox');
  sb.style.display = 'flex';
  sb.innerHTML = `<div class="state-icon">${icon}</div>
    <div class="state-title">${title}</div>
    <div class="state-sub">${sub}</div>`;
  document.getElementById('priceTable').style.display = 'none';
}

function fetchXlsx(url) {
  return fetch(url)
    .then(r => {
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      return r.arrayBuffer();
    })
    .then(buf => {
      const wb = XLSX.read(buf, { type: 'array' });
      const ws = wb.Sheets[wb.SheetNames[0]];
      return XLSX.utils.sheet_to_json(ws, { defval: '' });
    });
}

// ═══════════════════════════════════════════════════════
//  LOAD DATA
// ═══════════════════════════════════════════════════════
async function loadAll() {
  try {
    setProgress(5, 'Vevő adatbázis letöltése…');
    const custRaw = await fetchXlsx(URLS.customers);
    setProgress(35, 'Árlista letöltése…');
    const priceRaw = await fetchXlsx(URLS.prices);
    setProgress(65, 'Készlet adatok letöltése…');
    let stockRaw = [];
    try {
      stockRaw = await fetchXlsx(URLS.stock);
    } catch(e) {
      console.warn('Készlet betöltés sikertelen:', e);
    }
    setProgress(85, 'Feldolgozás…');
    processData(custRaw, priceRaw, stockRaw);
    setProgress(100, 'Kész');
    buildCustomerSelect();
    setStatus('<span class="hl">✓</span> Adatok betöltve');
  } catch(e) {
    console.error(e);
    setStatus('⚠ Betöltési hiba');
    showState('⚠', 'Betöltési hiba', 'Nem sikerült az adatforráshoz kapcsolódni. Ellenőrizze a hálózatot és a CORS beállításokat.<br><small style="opacity:.5">' + e.message + '</small>');
  }
}

// ═══════════════════════════════════════════════════════
//  PROCESS
// ═══════════════════════════════════════════════════════
function processData(custRaw, priceRaw, stockRaw) {
  // ── Customers ──
  // Expected columns: something like "Vevő neve", "Csoport" or "Csoportok"
  // We'll auto-detect
  rawCustomers = [];
  if (custRaw.length) {
    const keys = Object.keys(custRaw[0]);
    // Find name column (first col likely)
    const nameKey = keys[0];
    // Find group column (look for csoport/group/groups)
    const groupKey = keys.find(k =>
      /csoport|group|tag|kategor/i.test(k)
    ) || keys[1];

    custRaw.forEach(row => {
      const name = String(row[nameKey] || '').trim();
      if (!name) return;
      // Groups may be comma or semicolon separated, or multiple columns
      let groups = [];
      if (groupKey && row[groupKey]) {
        groups = String(row[groupKey])
          .split(/[,;|\/\n]+/)
          .map(g => g.trim())
          .filter(Boolean);
      }
      // Also scan all columns for group-like values
      keys.forEach(k => {
        if (k === nameKey) return;
        const v = String(row[k] || '').trim();
        if (v && !groups.includes(v)) groups.push(v);
      });
      rawCustomers.push({ name, groups });
    });
  }

  // ── Prices ──
  // Expected: SKU, Cikknév, [arsor columns], Upsell
  rawPrices = {};
  if (priceRaw.length) {
    const keys = Object.keys(priceRaw[0]);
    const skuKey  = keys.find(k => /^sku$/i.test(k.trim())) || keys[0];
    const nameKey = keys.find(k => /név|name|cikk|megnevez/i.test(k)) || keys[1];
    const upsellKey = keys.find(k => /upsell/i.test(k));
    // arsor columns
    const arsorKeys = keys.filter(k => /^arsor/i.test(k.trim()));

    // Build price map per arsor
    arsorKeys.forEach(ak => { rawPrices[ak.trim().toLowerCase()] = []; });

    priceRaw.forEach(row => {
      const rawSku = row[skuKey];
      const sku = normalizeSKU(rawSku);
      if (!sku) return;
      const cikkNev = String(row[nameKey] || '').trim();
      const upsellRaw = upsellKey ? String(row[upsellKey] || '').trim() : '';
      // Parse upsell SKU list
      const upsellSkus = upsellRaw
        ? upsellRaw.split(/[,;]+/).map(s => normalizeSKU(s)).filter(Boolean)
        : [];

      arsorKeys.forEach(ak => {
        const arsorNorm = ak.trim().toLowerCase();
        const price = row[ak];
        rawPrices[arsorNorm].push({
          sku,
          cikkNev,
          price: price !== '' && price !== undefined ? price : null,
          upsellSkus
        });
      });
    });

    // Build skuIndex from first arsor (or all)
    skuIndex = {};
    (rawPrices[arsorKeys[0]?.trim().toLowerCase()] || []).forEach(r => {
      skuIndex[r.sku] = r;
    });
  }

  // ── Stock ──
  stockMap = {};
  if (stockRaw.length) {
    const keys = Object.keys(stockRaw[0]);
    const skuKey   = keys.find(k => /^sku$/i.test(k.trim())) || keys[0];
    const sizeKey  = keys.find(k => /méret|size/i.test(k)) || keys[1];
    const stockKey = keys.find(k => /készlet|stock|qty|menny/i.test(k)) || keys[2];

    stockRaw.forEach(row => {
      const sku = normalizeSKU(row[skuKey]);
      if (!sku) return;
      if (!stockMap[sku]) stockMap[sku] = [];
      stockMap[sku].push({
        size: String(row[sizeKey] || '').trim() || '-',
        stock: row[stockKey] !== '' ? Number(row[stockKey]) : null
      });
    });
  }
}

// ═══════════════════════════════════════════════════════
//  CUSTOMER SELECT
// ═══════════════════════════════════════════════════════
function buildCustomerSelect() {
  const sel = document.getElementById('customerSelect');
  sel.innerHTML = '<option value="">— Válasszon vevőt —</option>';

  const sorted = [...rawCustomers].sort((a,b) => a.name.localeCompare(b.name, 'hu'));
  sorted.forEach((c, i) => {
    const opt = document.createElement('option');
    opt.value = c.name;
    opt.textContent = c.name;
    sel.appendChild(opt);
  });

  if (rawCustomers.length === 0) {
    showState('👤', 'Nincs vevő adat', 'A vevő adatbázis üres vagy nem sikerült feldolgozni.');
  } else {
    showState('👤', 'Válasszon vevőt', 'A felső legördülő menüből válassza ki a vevőt az árlista megjelenítéséhez.');
  }
  setStatus(`<span class="hl">${rawCustomers.length}</span> vevő betöltve`);
}

function onCustomerChange() {
  const name = document.getElementById('customerSelect').value;
  upsellFilter = null;
  document.getElementById('filterBar').style.display = 'none';
  document.getElementById('skuSearch').value = '';
  searchQuery = '';

  if (!name) {
    showState('👤', 'Válasszon vevőt', 'A felső legördülő menüből válassza ki a vevőt.');
    return;
  }

  currentCustomer = rawCustomers.find(c => c.name === name);
  if (!currentCustomer) return;

  // Find arsor group
  const arsorGroups = currentCustomer.groups
    .filter(g => /^arsor/i.test(g));

  if (arsorGroups.length === 0) {
    showState('🔍', 'Nincs árlista', `A(z) "${name}" vevőhöz nem tartozik "arsor" csoport.`);
    currentArsor = null;
    return;
  }

  // First arsor group
  currentArsor = arsorGroups[0].trim().toLowerCase();

  if (!rawPrices[currentArsor] || rawPrices[currentArsor].length === 0) {
    showState('📋', 'Üres árlista', `Az "${currentArsor}" árlistán nincs termék.`);
    return;
  }

  renderTable();
}

// ═══════════════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════════════
function getFilteredRows() {
  if (!currentArsor || !rawPrices[currentArsor]) return [];
  let rows = rawPrices[currentArsor];

  // Upsell filter
  if (upsellFilter) {
    rows = rows.filter(r => upsellFilter.has(r.sku));
  }

  // Search filter
  if (searchQuery) {
    const q = normalizeSKU(searchQuery);
    rows = rows.filter(r => r.sku.includes(q) || normalizeSKU(r.cikkNev).includes(q));
  }

  return rows;
}

function formatPrice(p) {
  if (p === null || p === undefined || p === '') return '<span class="price-dash">—</span>';
  const n = typeof p === 'number' ? p : parseFloat(String(p).replace(/[^0-9.,]/g,'').replace(',','.'));
  if (isNaN(n)) return '<span class="price-dash">—</span>';
  return n.toLocaleString('hu-HU') + ' Ft';
}

function renderTable() {
  const rows = getFilteredRows();
  currentRows = rows;

  if (rows.length === 0) {
    showState('🔎', 'Nincs találat', 'Módosítsa a keresési feltételeket.');
    document.getElementById('priceTable').style.display = 'none';
    return;
  }

  document.getElementById('stateBox').style.display = 'none';
  const table = document.getElementById('priceTable');
  table.style.display = 'table';

  const tbody = document.getElementById('tableBody');

  // Build HTML string for performance
  const parts = [];
  rows.forEach(row => {
    const stockEntries = stockMap[row.sku] || [];

    if (stockEntries.length === 0) {
      parts.push(buildRow(row, '-', null));
    } else {
      stockEntries.forEach((se, idx) => {
        parts.push(buildRow(row, se.size, se.stock, idx > 0));
      });
    }
  });

  tbody.innerHTML = parts.join('');

  // Status
  setStatus(`<span class="hl">${rows.length}</span> termék · ${currentArsor}`);
}

function buildRow(row, size, stock, continuation) {
  const isOOS = stock !== null && stock === 0;
  const skuClass = 'sku-cell' + (isOOS ? ' out-of-stock' : '');

  let stockHtml;
  if (stock === null) {
    stockHtml = '<span class="stock-dash">—</span>';
  } else if (stock === 0) {
    stockHtml = `<span class="stock-zero">${stock}</span>`;
  } else {
    stockHtml = `<span class="stock-ok">${stock}</span>`;
  }

  const priceHtml = continuation ? '' : formatPrice(row.price);
  const nameHtml  = continuation ? '' : escHtml(row.cikkNev);
  const skuHtml   = continuation ? '' : `<span class="${skuClass}">${escHtml(row.sku)}</span>`;

  let upsellHtml = '';
  if (!continuation && row.upsellSkus && row.upsellSkus.length) {
    upsellHtml = row.upsellSkus
      .map(u => `<a class="upsell-tag" href="#" data-upsell="${escAttr(u)}">${escHtml(u)}</a>`)
      .join('');
  }

  return `<tr>
    <td class="sku-cell">${skuHtml}</td>
    <td class="name-cell">${nameHtml}</td>
    <td class="size-cell">${escHtml(size)}</td>
    <td class="stock-cell" style="text-align:right;">${stockHtml}</td>
    <td class="price-cell">${priceHtml}</td>
    <td class="upsell-cell">${upsellHtml}</td>
    <td><button class="btn-up" onclick="scrollTop()">↑</button></td>
  </tr>`;
}

function escHtml(s) {
  return String(s||'')
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}
function escAttr(s) { return escHtml(s); }

// ═══════════════════════════════════════════════════════
//  UPSELL FILTER
// ═══════════════════════════════════════════════════════
function applyUpsellFilter(clickedSku) {
  if (!currentArsor) return;
  const rows = rawPrices[currentArsor];

  // Find what upsell group this SKU belongs to
  // The group is defined by the clicked SKU's own upsell list,
  // but we also need to find all rows that share that list
  const clickedRow = rows.find(r => r.sku === clickedSku);
  if (!clickedRow || !clickedRow.upsellSkus.length) return;

  // Build the group: all SKUs in clickedRow.upsellSkus
  const groupSet = new Set(clickedRow.upsellSkus);

  upsellFilter = groupSet;

  // Show filter bar
  document.getElementById('filterBar').style.display = 'flex';
  document.getElementById('upsellChipLabel').textContent = clickedSku;

  renderTable();
}

function clearUpsellFilter() {
  upsellFilter = null;
  document.getElementById('filterBar').style.display = 'none';
  renderTable();
}

// ═══════════════════════════════════════════════════════
//  EVENTS
// ═══════════════════════════════════════════════════════
document.getElementById('customerSelect').addEventListener('change', onCustomerChange);

document.getElementById('skuSearch').addEventListener('input', function() {
  searchQuery = this.value.trim();
  if (currentArsor) renderTable();
});

document.getElementById('clearUpsell').addEventListener('click', function(e) {
  e.preventDefault();
  clearUpsellFilter();
});

// Delegated click for upsell tags
document.getElementById('tableBody').addEventListener('click', function(e) {
  const tag = e.target.closest('.upsell-tag');
  if (tag) {
    e.preventDefault();
    applyUpsellFilter(tag.dataset.upsell);
  }
});

function scrollTop() {
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ═══════════════════════════════════════════════════════
//  BOOT
// ═══════════════════════════════════════════════════════
loadAll();
</script>
