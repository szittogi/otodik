<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Árlista</title>

<!-- SheetJS for Excel parsing -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
  /* ── Design tokens ── */
  :root {
    --bg:        #0f1117;
    --surface:   #181c27;
    --surface2:  #1f2435;
    --border:    #2a3050;
    --accent:    #4f8ef7;
    --accent2:   #7c5cfc;
    --text:      #e2e6f0;
    --muted:     #7a85a0;
    --danger:    #e05a5a;
    --danger-bg: rgba(224,90,90,.12);
    --green:     #3ecf8e;
    --radius:    8px;
    --font-head: 'DM Mono', 'Courier New', monospace;
    --font-body: 'DM Sans', 'Segoe UI', sans-serif;
    --shadow:    0 4px 24px rgba(0,0,0,.4);
  }

  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 14px;
    min-height: 100vh;
  }

  /* ── Top bar ── */
  #topbar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 20px;
    box-shadow: var(--shadow);
  }

  #topbar-inner {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-items: center;
    max-width: 1600px;
    margin: 0 auto;
  }

  .logo {
    font-family: var(--font-head);
    font-size: 15px;
    font-weight: 500;
    color: var(--accent);
    letter-spacing: .05em;
    white-space: nowrap;
  }

  .ctrl-group {
    display: flex;
    align-items: center;
    gap: 8px;
    flex: 1 1 200px;
  }

  label.ctrl-label {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .06em;
    white-space: nowrap;
  }

  input[type="text"], select {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    padding: 7px 12px;
    font-family: var(--font-body);
    font-size: 13px;
    outline: none;
    transition: border-color .15s;
    min-width: 0;
    width: 100%;
  }
  input[type="text"]:focus, select:focus { border-color: var(--accent); }

  /* autocomplete dropdown */
  .autocomplete-wrap { position: relative; flex: 1 1 180px; }
  #customer-dropdown {
    position: absolute;
    top: calc(100% + 4px);
    left: 0; right: 0;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    max-height: 260px;
    overflow-y: auto;
    z-index: 200;
    box-shadow: var(--shadow);
    display: none;
  }
  #customer-dropdown.open { display: block; }
  .dd-item {
    padding: 8px 12px;
    cursor: pointer;
    font-size: 13px;
    border-bottom: 1px solid var(--border);
  }
  .dd-item:last-child { border-bottom: none; }
  .dd-item:hover, .dd-item.active { background: var(--accent); color: #fff; }

  /* badge row */
  #badge-row {
    width: 100%;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
    margin-top: 4px;
    min-height: 24px;
  }
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 3px 10px;
    font-size: 11px;
    color: var(--muted);
  }
  .badge span { color: var(--text); font-weight: 500; }
  .badge.accent-badge { border-color: var(--accent); color: var(--accent); }
  .badge.upsell-badge { border-color: var(--accent2); color: var(--accent2); }

  #info-row {
    font-size: 11px;
    color: var(--muted);
    margin-left: auto;
    white-space: nowrap;
  }

  /* buttons */
  .btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    padding: 7px 14px;
    font-family: var(--font-body);
    font-size: 12px;
    cursor: pointer;
    white-space: nowrap;
    transition: border-color .15s, color .15s;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn-sm {
    padding: 3px 10px;
    font-size: 11px;
    border-radius: 6px;
  }
  .btn-up {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--muted);
    padding: 2px 8px;
    cursor: pointer;
    font-size: 12px;
    transition: all .15s;
  }
  .btn-up:hover { border-color: var(--accent); color: var(--accent); }

  /* ── Main content ── */
  #main {
    max-width: 1600px;
    margin: 0 auto;
    padding: 20px;
  }

  /* status / loading */
  #status {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    text-align: center;
    color: var(--muted);
    font-size: 13px;
  }
  #status.error { border-color: var(--danger); color: var(--danger); background: var(--danger-bg); }

  .spinner {
    display: inline-block;
    width: 18px; height: 18px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .7s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Table ── */
  #table-wrap {
    overflow-x: auto;
    border-radius: var(--radius);
    border: 1px solid var(--border);
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  thead {
    position: sticky;
    top: 72px; /* below topbar */
    z-index: 10;
  }

  thead th {
    background: var(--surface2);
    color: var(--muted);
    font-family: var(--font-head);
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: .07em;
    padding: 10px 14px;
    text-align: left;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background .1s;
  }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--surface2); }

  td {
    padding: 9px 14px;
    vertical-align: middle;
    white-space: nowrap;
  }

  .sku-cell { font-family: var(--font-head); font-size: 12px; }
  .sku-cell.out-of-stock { color: var(--danger); opacity: .65; }
  .name-cell { white-space: normal; max-width: 320px; }
  .price-cell { font-variant-numeric: tabular-nums; text-align: right; }
  .stock-cell { text-align: center; }

  .upsell-link {
    display: inline-block;
    background: rgba(124,92,252,.15);
    border: 1px solid rgba(124,92,252,.4);
    border-radius: 4px;
    padding: 2px 7px;
    font-size: 11px;
    font-family: var(--font-head);
    color: var(--accent2);
    cursor: pointer;
    margin: 1px 2px;
    transition: background .15s;
    white-space: nowrap;
  }
  .upsell-link:hover { background: rgba(124,92,252,.35); }

  /* empty / no customer */
  #empty-msg {
    padding: 40px;
    text-align: center;
    color: var(--muted);
    font-size: 14px;
  }
</style>
</head>
<body>

<!-- ══════════════════ TOP BAR ══════════════════ -->
<div id="topbar">
  <div id="topbar-inner">

    <div class="logo">⬡ Árlista</div>

    <!-- Customer selector -->
    <div class="ctrl-group">
      <label class="ctrl-label">Vevő</label>
      <div class="autocomplete-wrap">
        <input id="customer-input" type="text" placeholder="Keress vevőt…" autocomplete="off" />
        <div id="customer-dropdown"></div>
      </div>
    </div>

    <!-- SKU search -->
    <div class="ctrl-group">
      <label class="ctrl-label">Cikkszám</label>
      <input id="sku-search" type="text" placeholder="pl. KR124…" />
    </div>

    <!-- Clear buttons -->
    <button class="btn btn-sm" id="btn-clear-upsell" style="display:none">Upsell törlése ✕</button>
    <button class="btn btn-sm" id="btn-clear-sku"    style="display:none">Kereső törlése ✕</button>
    <button class="btn btn-sm" id="btn-clear-all">Mindent töröl</button>

    <!-- Info -->
    <div id="info-row">—</div>
  </div>

  <!-- Active filter badges -->
  <div id="badge-row" style="max-width:1600px;margin:6px auto 0;padding:0 20px;"></div>
</div>

<!-- ══════════════════ MAIN ══════════════════ -->
<div id="main">
  <div id="status"><span class="spinner"></span> Adatok betöltése…</div>
  <div id="table-container"></div>
</div>

<script>
/* ══════════════════════════════════════════════════════════════════
   CONFIGURATION
══════════════════════════════════════════════════════════════════ */
const URLS = {
  customers : 'https://app.clouderp.hu/api/1/automatism/file-share/?s=Z0FBQUFBQnByX1NMTmlManAzeV9WMy03a0ZaZE5WRF9TTWF2QjBjT1pfeWhmV1NPbl9IV080bHZmbEJPZm1xWUticWdwM1pfV0s1X0ZDUUx4ZmR6QTJaOTVmbm51d2RSeVN6VFdEVlhsMGstb0ZVbUxuWC10VFk9',
  pricelist : 'https://app.clouderp.hu/api/1/automatism/file-share/?s=Z0FBQUFBQnByX1ExZkFLeWtTWlJybUFDUDY1QkVwc2pHeE5zVW1qSUJlTjdHcUlwLWkyVXhudmYzRHQ5aEk2Zk9yLWNKMWRfNU9HYmh0VklTdlcwdGZfN0RHbmFfMlpLY2xMbzk2elFyM2Y0eDNNdkpFcW1rLVU9',
  stocksize : 'https://app.clouderp.hu/api/1/automatism/file-share/?s=Z0FBQUFBQnBzVXhKeDR2Wnp5X0I1LXZrUHU1OXJUdVlUN1FqTVVBVl9PMHJodG85SXNOVUQwcHBOak9NYUZQZnJxSWptSU5vTmpfN0V6anptclRBNXI1SG54NHpydVYwZXpJdllsODhOWkUxMk9ZN2M1WG5ua2M9',
};

/* ══════════════════════════════════════════════════════════════════
   HELPERS
══════════════════════════════════════════════════════════════════ */

/** Normalize SKU: uppercase, remove non-alphanumeric */
function normalizeSKU(sku) {
  return String(sku || '').toUpperCase().replace(/[^A-Z0-9]/g, '');
}

/** Find a column value by flexible header name matching */
function findCol(row, candidates) {
  for (const key of Object.keys(row)) {
    const k = key.toLowerCase().replace(/[\s_\-]/g, '');
    for (const c of candidates) {
      if (k.includes(c.toLowerCase().replace(/[\s_\-]/g, ''))) return row[key];
    }
  }
  return undefined;
}

/** Parse upsell string → array of normalized SKUs */
function parseUpsellList(str) {
  return String(str || '')
    .split(/[,;|\s]+/)
    .map(s => normalizeSKU(s))
    .filter(Boolean);
}

/** Try parse number */
function toNum(v) {
  if (v === undefined || v === null || v === '') return null;
  const n = parseFloat(String(v).replace(',', '.'));
  return isNaN(n) ? null : n;
}

/** Format HUF price */
function fmtPrice(v) {
  const n = toNum(v);
  if (n === null) return '–';
  return n.toLocaleString('hu-HU', { minimumFractionDigits: 0 }) + ' Ft';
}

/* ══════════════════════════════════════════════════════════════════
   DATA LOADING
══════════════════════════════════════════════════════════════════ */

/** Fetch URL as ArrayBuffer, then parse with SheetJS → array of row objects */
async function loadExcel(url) {
  const resp = await fetch(url);
  if (!resp.ok) throw new Error(`HTTP ${resp.status} – ${url}`);
  const buf  = await resp.arrayBuffer();
  const wb   = XLSX.read(buf, { type: 'array' });
  const ws   = wb.Sheets[wb.SheetNames[0]];
  return XLSX.utils.sheet_to_json(ws, { defval: '' });
}

/* ══════════════════════════════════════════════════════════════════
   APPLICATION STATE
══════════════════════════════════════════════════════════════════ */
const state = {
  customers      : [],   // [{id, name, groups:[]}]
  pricelist      : [],   // raw rows
  stocksize      : [],   // raw rows

  // built indexes
  customerMap    : {},   // normalizedName → customer obj
  priceByArsor   : {},   // arsorKey → [priceRow]
  stockMap       : {},   // normalizedSKU → {size, stock, upsell}
  upsellIndex    : {},   // normalizedSKU → Set of normalizedSKUs

  // UI state
  selectedCustomer : null,
  activeArsor      : null,
  visibleRows      : [],
  activeUpsellSKUs : null,   // Set or null
  skuFilter        : '',
};

/* ══════════════════════════════════════════════════════════════════
   PARSING: CUSTOMERS
══════════════════════════════════════════════════════════════════ */

/**
 * Build customer list.
 * Expected columns (flexible): partner/vevo/name, csoport/group/groups
 */
function parseCustomers(rows) {
  state.customers = [];
  state.customerMap = {};

  for (const row of rows) {
    const name   = findCol(row, ['partner','vevo','nev','name','ugyfel']) ?? '';
    const groups = findCol(row, ['csoport','group','groups','kategoria','category']) ?? '';

    if (!name) continue;

    const groupList = String(groups)
      .split(/[,;|\n]+/)
      .map(g => g.trim())
      .filter(Boolean);

    const obj = { name: String(name).trim(), groups: groupList };
    state.customers.push(obj);
    state.customerMap[obj.name.toLowerCase()] = obj;
  }

  // Sort alphabetically
  state.customers.sort((a, b) => a.name.localeCompare(b.name, 'hu'));
}

/* ══════════════════════════════════════════════════════════════════
   PARSING: PRICELIST
   Groups rows by the arsor-column value.
══════════════════════════════════════════════════════════════════ */
function parsePricelist(rows) {
  state.priceByArsor = {};

  for (const row of rows) {
    // Column that holds the arsor group assignment
    const arsorVal = String(
      findCol(row, ['arsor','arlista','arlistacsoport','pricelist','price_list','listacsop']) ?? ''
    ).trim().toLowerCase();

    if (!arsorVal) continue;

    if (!state.priceByArsor[arsorVal]) state.priceByArsor[arsorVal] = [];
    state.priceByArsor[arsorVal].push(row);
  }
}

/* ══════════════════════════════════════════════════════════════════
   PARSING: STOCK / SIZE / UPSELL
══════════════════════════════════════════════════════════════════ */
function parseStockSize(rows) {
  state.stockMap = {};

  for (const row of rows) {
    const rawSKU = findCol(row, ['sku','cikkszam','cikk','kod','code','item']) ?? '';
    const nSKU   = normalizeSKU(rawSKU);
    if (!nSKU) continue;

    const size   = String(findCol(row, ['meret','size','méret']) ?? '').trim() || '–';
    const stock  = toNum(findCol(row, ['keszlet','keszleten','stock','qty','mennyiseg','db','pieces','quantity']));
    const upsell = String(findCol(row, ['upsell','upsell_sku','kapcsolt','related']) ?? '').trim();

    state.stockMap[nSKU] = { size, stock, upsell };
  }
}

/* ══════════════════════════════════════════════════════════════════
   BUILD UPSELL INDEX
   For each SKU, collect the union of all SKUs that share at least
   one upsell reference with it (transitive group).
══════════════════════════════════════════════════════════════════ */
function buildUpsellIndex(priceRows) {
  state.upsellIndex = {};

  // Raw edges: SKU → [connected SKUs]
  const edges = {};

  const registerEdge = (fromSKU, toSKUs) => {
    if (!edges[fromSKU]) edges[fromSKU] = new Set();
    for (const t of toSKUs) {
      if (t && t !== fromSKU) {
        edges[fromSKU].add(t);
        if (!edges[t]) edges[t] = new Set();
        edges[t].add(fromSKU);
      }
    }
  };

  // From pricelist
  for (const row of priceRows) {
    const rawSKU   = findCol(row, ['sku','cikkszam','cikk','kod','code','item']) ?? '';
    const nSKU     = normalizeSKU(rawSKU);
    if (!nSKU) continue;
    const upStr    = String(findCol(row, ['upsell','upsell_sku','kapcsolt','related']) ?? '').trim();
    const upList   = parseUpsellList(upStr);
    if (upList.length) registerEdge(nSKU, upList);
  }

  // From stockMap (override / supplement)
  for (const [nSKU, info] of Object.entries(state.stockMap)) {
    if (info.upsell) {
      const upList = parseUpsellList(info.upsell);
      if (upList.length) registerEdge(nSKU, upList);
    }
  }

  // BFS / union-find to build connected components
  const visited = new Set();
  const allSKUs = new Set([...Object.keys(edges)]);

  const getComponent = (startSKU) => {
    const comp = new Set();
    const queue = [startSKU];
    while (queue.length) {
      const cur = queue.pop();
      if (comp.has(cur)) continue;
      comp.add(cur);
      for (const nb of (edges[cur] || [])) {
        if (!comp.has(nb)) queue.push(nb);
      }
    }
    return comp;
  };

  for (const sku of allSKUs) {
    if (visited.has(sku)) continue;
    const comp = getComponent(sku);
    for (const s of comp) {
      visited.add(s);
      state.upsellIndex[s] = comp;
    }
  }
}

/* ══════════════════════════════════════════════════════════════════
   GET ARSOR GROUP FOR CUSTOMER
══════════════════════════════════════════════════════════════════ */
function getArsorGroup(customer) {
  if (!customer) return null;
  for (const g of customer.groups) {
    if (g.toLowerCase().startsWith('arsor')) return g.toLowerCase();
  }
  return null;
}

/* ══════════════════════════════════════════════════════════════════
   MERGE: Build display rows for selected arsor
══════════════════════════════════════════════════════════════════ */
function buildVisibleRows(arsor) {
  const priceRows = state.priceByArsor[arsor] || [];
  const result = [];

  for (const row of priceRows) {
    const rawSKU  = findCol(row, ['sku','cikkszam','cikk','kod','code','item']) ?? '';
    const nSKU    = normalizeSKU(rawSKU);
    if (!nSKU) continue;

    const name    = String(findCol(row, ['cikknev','nev','name','leiras','description','termek']) ?? '').trim();
    const price   = findCol(row, ['ar','ara','price','listaár','listaar','netto','brutto','egysegar']);

    // upsell: prefer stockMap, fallback to pricelist
    const stockInfo  = state.stockMap[nSKU];
    const upFromStock = stockInfo?.upsell ?? '';
    const upFromPrice = String(findCol(row, ['upsell','upsell_sku','kapcsolt','related']) ?? '').trim();
    const upsellStr  = upFromStock || upFromPrice;
    const upsellList = parseUpsellList(upsellStr);

    result.push({
      sku    : nSKU,
      rawSKU : rawSKU,
      name,
      price,
      size   : stockInfo?.size   ?? '–',
      stock  : stockInfo?.stock  ?? null,
      upsellList,
    });
  }

  state.visibleRows = result;

  // Build upsell index for this arsor's SKUs
  buildUpsellIndex(priceRows);
}

/* ══════════════════════════════════════════════════════════════════
   RENDER TABLE
══════════════════════════════════════════════════════════════════ */
function renderTable() {
  const container = document.getElementById('table-container');

  let rows = state.visibleRows;

  // Apply upsell filter
  if (state.activeUpsellSKUs) {
    rows = rows.filter(r => state.activeUpsellSKUs.has(r.sku));
  }

  // Apply SKU text filter
  if (state.skuFilter) {
    const q = normalizeSKU(state.skuFilter);
    rows = rows.filter(r => r.sku.includes(q));
  }

  // Update info
  updateBadges(rows.length);

  if (rows.length === 0) {
    container.innerHTML = '<div id="empty-msg">Nincs találat a szűrési feltételeknek megfelelően.</div>';
    return;
  }

  // Build table HTML (use fragment for performance)
  const tBody = document.createElement('tbody');

  for (const r of rows) {
    const outOfStock = (r.stock !== null && r.stock <= 0);
    const stockDisp  = r.stock === null ? '–' : String(r.stock);
    const upsellHTML = r.upsellList.length
      ? r.upsellList.map(u =>
          `<span class="upsell-link" data-upsell="${u}">${u}</span>`
        ).join('')
      : '–';

    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td class="sku-cell ${outOfStock ? 'out-of-stock' : ''}">${r.sku}</td>
      <td class="name-cell">${escHtml(r.name)}</td>
      <td>${escHtml(r.size)}</td>
      <td class="stock-cell">${stockDisp}</td>
      <td class="price-cell">${fmtPrice(r.price)}</td>
      <td>${upsellHTML}</td>
      <td><button class="btn-up" onclick="scrollToTop()">↑ Fel</button></td>
    `;
    tBody.appendChild(tr);
  }

  const table = document.createElement('table');
  table.innerHTML = `
    <thead>
      <tr>
        <th>SKU</th>
        <th>Cikknév</th>
        <th>Méret</th>
        <th>Készleten</th>
        <th>Ár</th>
        <th>Upsell</th>
        <th></th>
      </tr>
    </thead>
  `;
  table.appendChild(tBody);

  // Wrap in scroll div
  const wrap = document.createElement('div');
  wrap.id = 'table-wrap';
  wrap.appendChild(table);

  container.innerHTML = '';
  container.appendChild(wrap);

  // Upsell click delegation
  wrap.addEventListener('click', e => {
    const el = e.target.closest('.upsell-link');
    if (!el) return;
    const clickedSKU = normalizeSKU(el.dataset.upsell);
    applyUpsellFilter(clickedSKU);
  });
}

function escHtml(str) {
  return String(str ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

/* ══════════════════════════════════════════════════════════════════
   UPSELL FILTER
══════════════════════════════════════════════════════════════════ */
function applyUpsellFilter(sku) {
  const comp = state.upsellIndex[sku];
  if (!comp || comp.size === 0) {
    // fallback: just show the one SKU
    state.activeUpsellSKUs = new Set([sku]);
  } else {
    state.activeUpsellSKUs = comp;
  }
  document.getElementById('btn-clear-upsell').style.display = '';
  renderTable();
}

/* ══════════════════════════════════════════════════════════════════
   BADGES / STATUS
══════════════════════════════════════════════════════════════════ */
function updateBadges(count) {
  const row = document.getElementById('badge-row');
  const info = document.getElementById('info-row');
  row.innerHTML = '';

  const add = (label, val, cls = '') => {
    const b = document.createElement('div');
    b.className = 'badge ' + cls;
    b.innerHTML = `${label}: <span>${escHtml(val)}</span>`;
    row.appendChild(b);
  };

  if (state.selectedCustomer) add('Vevő', state.selectedCustomer.name, 'accent-badge');
  if (state.activeArsor)      add('Árlista', state.activeArsor, 'accent-badge');
  if (state.activeUpsellSKUs) add('Upsell szűrő', `${state.activeUpsellSKUs.size} termék`, 'upsell-badge');
  if (state.skuFilter)        add('SKU kereső', state.skuFilter);

  info.textContent = `${count} termék`;
}

/* ══════════════════════════════════════════════════════════════════
   CUSTOMER AUTOCOMPLETE
══════════════════════════════════════════════════════════════════ */
function initCustomerAutocomplete() {
  const input = document.getElementById('customer-input');
  const dd    = document.getElementById('customer-dropdown');
  let ddIdx   = -1;

  const show = (items) => {
    dd.innerHTML = '';
    ddIdx = -1;
    if (!items.length) { dd.classList.remove('open'); return; }
    items.forEach((c, i) => {
      const div = document.createElement('div');
      div.className = 'dd-item';
      div.textContent = c.name;
      div.addEventListener('mousedown', () => selectCustomer(c));
      dd.appendChild(div);
    });
    dd.classList.add('open');
  };

  input.addEventListener('input', () => {
    const q = input.value.trim().toLowerCase();
    if (!q) { show(state.customers.slice(0, 50)); return; }
    const filtered = state.customers.filter(c => c.name.toLowerCase().includes(q)).slice(0, 50);
    show(filtered);
  });

  input.addEventListener('focus', () => {
    show(state.customers.slice(0, 50));
  });

  input.addEventListener('blur', () => {
    setTimeout(() => dd.classList.remove('open'), 150);
  });

  input.addEventListener('keydown', e => {
    const items = dd.querySelectorAll('.dd-item');
    if (e.key === 'ArrowDown') { ddIdx = Math.min(ddIdx + 1, items.length - 1); highlight(items); e.preventDefault(); }
    else if (e.key === 'ArrowUp') { ddIdx = Math.max(ddIdx - 1, 0); highlight(items); e.preventDefault(); }
    else if (e.key === 'Enter' && ddIdx >= 0) { items[ddIdx]?.dispatchEvent(new MouseEvent('mousedown')); }
    else if (e.key === 'Escape') { dd.classList.remove('open'); }
  });

  const highlight = (items) => {
    items.forEach((el, i) => el.classList.toggle('active', i === ddIdx));
    items[ddIdx]?.scrollIntoView({ block: 'nearest' });
  };
}

function selectCustomer(customer) {
  state.selectedCustomer = customer;
  state.activeUpsellSKUs = null;
  state.skuFilter = '';
  document.getElementById('customer-input').value = customer.name;
  document.getElementById('sku-search').value = '';
  document.getElementById('btn-clear-upsell').style.display = 'none';
  document.getElementById('btn-clear-sku').style.display    = 'none';

  const arsor = getArsorGroup(customer);
  state.activeArsor = arsor;

  const statusEl = document.getElementById('status');
  const tableEl  = document.getElementById('table-container');

  if (!arsor) {
    tableEl.innerHTML = `<div id="empty-msg">A vevőhöz nem tartozik <em>arsor…</em> csoport.</div>`;
    updateBadges(0);
    return;
  }

  if (!state.priceByArsor[arsor]) {
    tableEl.innerHTML = `<div id="empty-msg">Nincs árlista a(z) <em>${arsor}</em> csoporthoz.</div>`;
    updateBadges(0);
    return;
  }

  buildVisibleRows(arsor);
  renderTable();
}

/* ══════════════════════════════════════════════════════════════════
   SKU SEARCH
══════════════════════════════════════════════════════════════════ */
function initSkuSearch() {
  const input = document.getElementById('sku-search');
  const btn   = document.getElementById('btn-clear-sku');

  input.addEventListener('input', () => {
    state.skuFilter = input.value.trim();
    btn.style.display = state.skuFilter ? '' : 'none';
    if (state.selectedCustomer && state.activeArsor) renderTable();
    else updateBadges(0);
  });
}

/* ══════════════════════════════════════════════════════════════════
   CLEAR BUTTONS
══════════════════════════════════════════════════════════════════ */
function initClearButtons() {
  document.getElementById('btn-clear-upsell').addEventListener('click', () => {
    state.activeUpsellSKUs = null;
    document.getElementById('btn-clear-upsell').style.display = 'none';
    renderTable();
  });

  document.getElementById('btn-clear-sku').addEventListener('click', () => {
    state.skuFilter = '';
    document.getElementById('sku-search').value = '';
    document.getElementById('btn-clear-sku').style.display = 'none';
    renderTable();
  });

  document.getElementById('btn-clear-all').addEventListener('click', () => {
    state.selectedCustomer = null;
    state.activeArsor = null;
    state.activeUpsellSKUs = null;
    state.skuFilter = '';
    state.visibleRows = [];
    document.getElementById('customer-input').value = '';
    document.getElementById('sku-search').value = '';
    document.getElementById('btn-clear-upsell').style.display = 'none';
    document.getElementById('btn-clear-sku').style.display    = 'none';
    document.getElementById('table-container').innerHTML = '';
    document.getElementById('badge-row').innerHTML = '';
    document.getElementById('info-row').textContent = '—';
  });
}

/* ══════════════════════════════════════════════════════════════════
   SCROLL TO TOP
══════════════════════════════════════════════════════════════════ */
function scrollToTop() {
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

/* ══════════════════════════════════════════════════════════════════
   MAIN BOOTSTRAP
══════════════════════════════════════════════════════════════════ */
async function main() {
  const statusEl = document.getElementById('status');

  const setStatus = (msg, isError = false) => {
    statusEl.style.display = '';
    statusEl.className = isError ? 'error' : '';
    statusEl.innerHTML = isError ? `⚠ ${escHtml(msg)}` : `<span class="spinner"></span> ${escHtml(msg)}`;
  };

  const hideStatus = () => { statusEl.style.display = 'none'; };

  try {
    setStatus('Vevőadatok betöltése…');
    const [custRows, priceRows, stockRows] = await Promise.all([
      loadExcel(URLS.customers).catch(e => { throw new Error('Vevőfájl: ' + e.message); }),
      loadExcel(URLS.pricelist).catch(e => { throw new Error('Árlistafájl: ' + e.message); }),
      loadExcel(URLS.stocksize).catch(e => { throw new Error('Készlet/méret fájl: ' + e.message); }),
    ]);

    setStatus('Adatok feldolgozása…');

    parseCustomers(custRows);
    parsePricelist(priceRows);
    parseStockSize(stockRows);

    hideStatus();

    // Init UI
    initCustomerAutocomplete();
    initSkuSearch();
    initClearButtons();

    document.getElementById('table-container').innerHTML =
      '<div id="empty-msg">Válassz vevőt a lista megjelenítéséhez.</div>';
    document.getElementById('info-row').textContent =
      `${state.customers.length} vevő betöltve`;

  } catch (err) {
    let msg = err.message;
    if (msg.includes('Failed to fetch') || msg.includes('NetworkError') || msg.includes('CORS')) {
      msg += ' — Lehetséges CORS-hiba. Ellenőrizd, hogy az adatforrás elérhető-e böngészőből.';
    }
    setStatus(msg, true);
    console.error(err);
  }
}

main();
</script>
